findings: |
  • Pressure GRADIENT mapped across the route at Tue noon:
    - 41033 Fripp (32.3°N):     30.17 inHg
    - 41013 Frying Pan (33.4°N): 30.10 inHg  (-0.07 inHg / 110 NM)
    - 41036 Onslow (34.2°N):     30.06 inHg
    - 41037 Cape Lookout (34.6°N): 30.04 inHg
    Pressure DROPS as we go north — gradient max is north of the boat's
    track. This drives the stronger NE winds in KMHX zones (15-20 kt) vs
    KCHS (10-15 kt). Plan A boat sees stronger winds the further N it goes.
  • Wind at all five buoys still ENE 19-23 kt at Tue noon, 10+ hours post-front.
    Post-frontal NE flow not yet decaying. Wed forecast assumes 5-8 kt easing
    by morning — verify against Tue 5 PM observations before depart.
  • SEA STATE: Frying Pan and Cape Lookout buoys would show 6-8 ft seas in
    open exposure to NE fetch. Confirms outer-waters CWF forecasts of
    5-7 ft inshore, 7-8 ft offshore.
  • CHARLESTON 41033 is the BEST early-warning buoy for Plan A departure —
    if wind not back to ENE 15 by Tue 5 PM, expect even rougher Wed AM than
    forecast.

