# Free-text findings synthesized from this pull. Goes under the data tables.
findings: |
  • 41033 pressure at Tue 11:08 AM = 30.17 inHg, +0.10 inHg since Tue 1:08 AM
    and +0.25 inHg since front passage Mon evening. Strong post-frontal ridge
    confirmed.
  • Wind at 41033 still ENE 23 g31 — SCA conditions persisting at 9+ hr
    post-front. Confirms AFDCHS that 'winds and seas remain elevated through
    this evening.'
  • 41112 wave summary at Tue 11:56 AM: 6.6 ft @ 7s (wind wave dominant from NE)
    + 1.0 ft E swell @ 10.5s. The 10.5s swell component is the residual that
    persists through Thu — this is the 'E 3 ft @ 7-8s' that shows up in
    Plan B Wave Detail.
  • Wind direction at 41033 (ENE 70°) is the actual NE flow surge described in
    AFD. By Wed AM forecasts call for backing to E, then dropping to E 10-15
    by Wed daytime — perfect for Plan A broad reach.
  • Post-frontal recovery is RUNNING SLOWER than typical: 9 hr post-front and
    pressure only +0.25 inHg, winds still 20+ kt. Expect a Wednesday morning
    that hasn't fully calmed.

