findings: |
  • 41013 Frying Pan pressure at Tue 11:10 AM = 30.10 inHg (+0.18 since front
    passage Tue 1 AM). Strong post-frontal recovery. Wind backed from NE 55° —
    classic post-frontal NE flow with diurnal backing toward E expected by
    Wed morning per AFDILM.
  • CLKN7 Cape Lookout: 30.18 inHg, NE 26 g34 — northern end of front cleared
    cleanly. Wave Detail on 41110 Masonboro shows 7.8 ft @ 8s with substantial
    11-second NE swell component — long-period residual that will persist
    into Wed and impact WP5/WP6 Frying Pan approach.
  • Front timing: passed 41013 (33.5°N) at Tue 1:10 AM and CLKN7 (34.6°N) at
    Tue 1:25 AM. Front speed ~9 kt N-bound, identical to forecast.
  • Buoy 41004 Edisto remains offline (May 2026 outage), reducing redundancy
    for WP1/WP2 verification — use 41008 Grays Reef as fallback southern
    reference for departure-zone conditions.
  • Wind elevated at 41036 Onslow Bay (NE 24.8 g31) confirms AFDMHX SCA
    extension through Wed AM for KMHX waters. SCAs end Wed 6 AM per AFDMHX.

