pull:
  label: "7:00 AM EDT Fri 5/15"
  utc: "2026-05-15T11:00:00Z"

front_passage:
  description: |
    Reinforcing dry cold front passed Thu PM (visible at Fripp 41033 ~5-6 PM
    EDT Thu). Post-frontal NE wind surge developed overnight and is ACTIVE
    at all three route buoys this morning. Peak gust observed was 31 kt at
    Fripp Island 41033 at 7 AM EDT — at the upper edge of AFDCHS's "25-30 kt
    nearshore" range. SCA in effect for AMZ360/362/364 until 10 AM EDT.
    Pressure rising at all three buoys: Fripp +3.0 hPa in 7 hr, Edisto +1.8
    hPa/3hr, Grays Reef +1.2 hPa/3hr — classic high-builds-behind-front pattern.
    Surge will diminish through the morning; by noon departure conditions
    will be NE 15-20 g25 → NE 12-17 kt early afternoon, easing further to
    E 10-15 kt mid/late afternoon and SE 5-10 kt evening.

