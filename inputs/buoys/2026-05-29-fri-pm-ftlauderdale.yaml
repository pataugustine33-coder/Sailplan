#
# These are PRE-DEPARTURE baselines. Departure is Mon 6/1 — about
# 63 hours after these readings. The forecast cycle (above) projects
# the conditions at each WP under the published forecast; these
# buoys are the ground-truth starting point.
#
# Pre-frontal pattern visible in the readings:
#   - LKWF1 (FL departure): E 6 G 7, light pre-frontal
#   - 41009 (Canaveral): NE 4 G 6, 2 ft swell @ 9s
#   - 41008 (Grays Reef GA): ENE 12 G 14 — moderate easterly
#   - 41004 (Edisto SC): ESE 16 G 18, 4 ft wind wave — front passage signal
#   - 41013 (Frying Pan NC): ENE 10 G 12, 3 ft swell @ 5.6s
#   - 41025 (Diamond Shoals): N 10 G 12 — post-frontal
#   - 41001 (E of Hatteras): NNW 6 G 8, 3.3 ft NE swell @ 5.6s
#   - 41002 (offshore SE of Hatteras): E 6 G 8, 3.3 ft ESE swell @ 8.3s
#   - 41010 (offshore E of Canaveral): WSW 6 G 8 — back-edge of front

