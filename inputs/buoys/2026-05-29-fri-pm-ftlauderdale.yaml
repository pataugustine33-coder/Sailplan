front_passage:
  description: |
    The Sat-Sun front passage is the dominant feature in this cycle.
    Current readings show the front in progress across the SC/NC
    coast — 41004 (Edisto SC) reads ESE 16 G 18 with 4 ft E wind
    wave @ 5s, classic front approach. 41001 already shows post-
    frontal NNW flow (front passed Hatteras N side).

    Stream-edge baseline reads from 41009 (off Canaveral) at NE 4
    G 6 with 2 ft E swell @ 9s — light, calm Stream-edge state.

    For Mon 6/1 departure window: 63 hours from these readings,
    after another full front passage cycle (the Sat-Sun reinforcing
    front detailed in CWFMHX synopsis). Buoys at that point should
    read light westerlies / abating seas per MFL/ILM/MHX outlooks.

