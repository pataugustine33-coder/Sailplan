# NDBC realtime/latest_obs buoys pulled fresh via Claude in Chrome
# Sun 6/21 between 3:08 PM and 4:10 PM EDT.
#
# These are PRE-DEPARTURE baselines. Departure Sun 6/21 5:00 PM EDT —
# about 1 hour after these readings. Conditions at the route start
# should match these within sea-breeze diurnal variation.
#
# Stations pulled:
#   LKWF1 — Lake Worth Pier (departure area)
#   41009 — Canaveral 20 NM E (on-track at WP3)
#   41010 — Canaveral E 120 NM (offshore reference)
#   41008 — Grays Reef NMS (on-track at WP8)
#   41033 — Fripp Island Nearshore SC (Hilton Head area, on-track at WP9)
#   41004 — Edisto SC offshore (Charleston approach)
#   41013 — Frying Pan NC (NOT on-track, used as broader regional reference)
#
# Pre-front pattern visible:
#   - LKWF1: SSE 13 G 14 — afternoon sea breeze
#   - 41009: E 2 G 4 — calm at Canaveral
#   - 41010 (offshore): WSW 6 G 8, pressure FALLING — system development
#   - 41008: no anemo data, 1.0 ft ESE swell @ 7s — calm GA waters
#   - 41033 (SC nearshore): SSW 14 G 18 — SC offshore already showing
#     building SW pattern AHEAD of front arrival Mon night
#   - 41004 (SC offshore): S 8 G 12, 1.3 ft SE @ 7s — moderate
#
# The 41033 reading is the key signal. Sun afternoon already at 14 G 18
# in the Hilton Head/Beaufort SC nearshore is consistent with CHS
# forecast Mon night SW 15-20 G 25 — front signal arriving early.

pull:
  label: "3:08-4:10 PM EDT Sun 6/21"
  utc: "2026-06-21T20:10:00Z"

front_passage:
  description: |
    Front approaches from N Mon night per JAX/CHS forecasts. Front
    development signal already present in offshore pressure FALLING
    at 41010 (Canaveral E 120 NM, 30.00 inHg falling). SC nearshore
    buoy 41033 reading SSW 14 G 18 at Sun afternoon is AHEAD of the
    forecast schedule — consistent with frontal influence reaching
    SC offshore earlier than Mon night.

    Departure Sun 6/21 5:00 PM EDT places vessel in benign FL waters
    for first ~21 hours. Front exposure begins Mon evening at WP5
    (off St Augustine) when MLB forecast shifts to S 10-15 kt building.
    Most active conditions Tue afternoon/evening at WP9-WP10
    (Hilton Head through Charleston Sea Buoy) where SW 15-20 G 25 is
    forecast.

