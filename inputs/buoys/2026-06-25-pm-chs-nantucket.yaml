# NDBC realtime buoys — Charleston SC → Nantucket MA route.
# All obs LIVE-fetched Thu Jun 25 2026 ~5:00 PM EDT (2100 GMT) via Chrome,
# except 44025 at 1950 GMT. Cross-checked against the Thu 6/25 PM OPC/AFD
# forecast cycle.
#
# KEY FINDINGS:
#   - Pre-frontal, benign NOW across the whole route. Pressures 30.03-30.15
#     inHg, light-to-moderate S-SW flow — consistent with the warm sector
#     ahead of the weekend cold front.
#   - SST GRADIENT confirms the fog risk on the Nantucket approach:
#       41002 (Gulf Stream)        water 83.5°F
#       44008 (Nantucket SE shelf) water 58.3°F
#     A ~25°F drop = classic advection-fog setup as warm Stream air moves
#     over the cold shelf. This is why the approach is YELLOW (fog), not
#     the wind.
#   - 44014 (Virginia Beach) wind & wave sensors are DOWN — temperature
#     channel only. No wind/wave ground-truth at the mid-Atlantic shelf;
#     lean on 44025 (Long Is) and OPC ANZ920/ANZ925 for WP6-7.

pull:
  label: "~5:00 PM EDT (2100 GMT) Thu 6/25"
  utc: "2026-06-25T21:00:00Z"

front_passage:
  description: |
    No frontal signal in the obs yet — this is the pre-frontal warm
    sector. Pressures are high and coherent (30.03-30.15 inHg) with no
    rapid drop. The cold front is still upstream; it reaches the
    mid-Atlantic offshore waters Sat night (the WP6 peak-hazard window),
    veering winds SW → NE behind it Sun-Mon. Watch 41002 and 41001
    pressure/wind for the front's offshore arrival on Saturday.

