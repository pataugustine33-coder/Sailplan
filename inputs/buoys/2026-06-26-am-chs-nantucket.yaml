# NDBC realtime buoys — Charleston SC → Nantucket MA route.
# All obs LIVE-fetched Fri Jun 26 2026 ~6:30 AM EDT (1030 GMT) via Chrome
# (44025 at 0910 GMT). Departure-morning ground truth.
#
# KEY FINDINGS:
#   - Benign across the whole route. Pressures HIGH and STEADY 30.08-30.17
#     inHg; light-to-moderate SSW down south, light SE up north. High
#     pressure firmly in control — no frontal signal in the obs.
#   - SST GRADIENT (fog driver) CONFIRMED AND INTACT:
#       41002 (Gulf Stream)        water 82.9°F
#       44008 (Nantucket SE shelf) water 59.2°F
#     ~24°F drop = classic advection-fog setup on the Nantucket approach.
#   - 44014 (Virginia Beach) wind & pressure sensors STILL DOWN (wave +
#     water-temp channels reporting). No wind ground-truth at the
#     mid-Atlantic shelf; lean on 44025 + OPC ANZ920/925 for WP6-7.
#   - 41008 (Grays Reef) wind-direction channel dropped this ob (speed
#     present at ~14 G 16); not on the rhumb line, departure-context only.

pull:
  label: "~6:30 AM EDT (1030 GMT) Fri 6/26"
  utc: "2026-06-26T10:30:00Z"

front_passage:
  description: |
    No frontal signal in the obs — high pressure in control, pressures
    30.08-30.17 inHg and steady. Per OPC OFFNT2, the (backdoor-type) cold
    front crosses the central/southern offshore waters Sun and Sun night,
    veering winds to NE behind it. Watch 41001 and 41002 for the offshore
    wind veer / pressure nudge as the front approaches Saturday-Sunday.

