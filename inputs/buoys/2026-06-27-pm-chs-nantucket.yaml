    Frontal approach underway. 41001 pressure falling (ridge moving off).
    OPC 445 PM: ridge E of the area early tonight, cold front into N waters
    tonight, crosses central waters Sun-Sun night, S waters Mon-Tue night;
    high builds behind. The boat is entering the corridor tonight in the
    pre-frontal warm sector — ANZ920 W-SW 10-20 kt, seas 4-7 ft, NUMEROUS
