# Waypoint-to-zone-period assignment per plan.
# This is the bridge: passage defines WPs and ETAs; forecast defines zones+periods;
# this section binds them. The build script uses zone+period to fetch the
# wind/sea/wave detail from the zones: section above.
#
# notes_addendum and weather_risk are passage-specific prose that complement the
# auto-generated Notes line. They're optional.
waypoint_assignments:
  plan_a:
    WP0:
      zone: AMZ360
      period: WED
      risk_level: yellow
      row_band: yellow
      pressure: 30.18
      pressure_trend: Rising slow
      notes_addendum: >
        Post-front clearance — front passed Mon evening ~10 PM, 10 hr post-front
        at departure. Buoy 41033 Tue 11:08 AM still showing ENE 23 g31 —
        post-frontal recovery running slower than typical. Expect seas at upper
        end of 4-5 ft early.
      weather_risk: >
        Daylight departure into post-frontal E flow. SCAs ended overnight Tue
        (3 AM Wed at latest per Tue 5/12 AFDCHS). Residual seas may still be
        4-5 ft early Wed AM — sporty but well within HR 48 capability. Verify
        Tue 5 PM CWF for final read on Wed AM sea state.
