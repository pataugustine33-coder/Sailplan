# Synopsis text from each office (verbatim from the cycle bulletins).
synopses:
  CHS:
    zone: AMZ300
    text: |
      A cold front far offshore and high pressure passing to our north will cause
      winds and seas to remain elevated through this evening. Conditions will
      improve tonight into Wednesday. Another cold front should quickly move
      through morning Thursday, followed by a broad area of high pressure.
  JAX:
    zone: AMZ400
    text: |
      A frontal boundary moving slowly southward across the northeast Florida
      waters will become stationary across central Florida tonight as a weak wave
      of low pressure currently over the eastern Gulf pushes eastward. High
      pressure situated along the Mid-Atlantic coast will continue to wedge down
      the southeastern seaboard, with Small Craft Advisory conditions
      overspreading the waters south of St. Augustine this afternoon. The wave
      of low pressure will push offshore of the east central Florida coast on
      Wednesday morning, with winds shifting to northerly while gradually
      decreasing. Another high pressure center building over the Great Lakes
      region will drive a dry frontal boundary southward across our local waters
      on Thursday morning. Northwesterly winds in the wake of this dry frontal
      passage on Thursday morning will shift to northeasterly by Thursday
      afternoon, with diminishing winds and seas expected on Thursday night and
      Friday.

# AFD key excerpts (CHS and JAX, current cycle).
afd_marine:
  CHS: |
    Today and tonight: Small Craft Advisories remain in effect into tonight for
    gusty northeast winds behind a cold front. Seas will rapidly build this
    morning, peaking this evening between 4-7 ft across the nearshore waters
    (0-20 nm) and 7-8 across the outer waters (20-60 nm). Marine conditions
    will gradually improve late tonight as high pressure builds southward.
    Extended Marine: Low pressure will pass offshore on Wednesday, bringing
    minimal additional impacts. A cold front should quickly move through the
    waters Thursday morning. Though, winds and seas shouldn't be high enough to
    prompt Small Craft Advisories.
  JAX: |
    A cold front over the Southeast Georgia waters will move into the Northeast
    Florida waters through the morning hours today. High pressure will build to
    the north today with a surge of northeasterly winds with Small Craft
    Advisory conditions developing throughout the waters. Winds will turn
    easterly into Wednesday morning with decreasing winds and seas. Showers may
    linger through Wednesday before another high pressure center builds
    southward from the Great Lakes region late this week with drier weather
    conditions into the upcoming weekend.

