# Plan-level commentary (the description block at top of each Plan tab).
plan_commentary:
  plan_a: >
    Plan A — Depart 8:00 AM Wed May 13 from Charleston Sea Buoy.

    *** STATUS UPGRADED Tue 5/12 1118 AM CHS / 1200 PM JAX cycle — see
    Verification Scorecard Lesson 17.

    🔄 PLAN CHARACTER FLIPPED: Tue refresh shows E 10-15 kt throughout Wed
    daylight (vs Mon forecast E 5-10). This converts WP0-WP3 from a motoring
    slog to a solid broad-reach sailing window.

    📍 ARRIVAL: Thu 6:29 AM EDT — civil dawn at Mayport is 6:06 AM, sunrise
    6:33 AM. Arrival within ±5 min of sunrise = DAY/late TWILIGHT.

    ⚠️ TRADE-OFFS: (1) Departure 8 AM Wed sails into elevated residual seas —
    buoys today show 6-7 ft @ 7s; by Wed 8 AM should be subsiding to 4-5 ft @
    7s per CWF. (2) E 10-15 is upper end; if winds hit 15 kt sustained, ETAs
    run ~1 hr earlier, pushing arrival into pre-dawn TWILIGHT.

  plan_b: >
    Plan B — Depart 6:00 AM Thu May 14 from Charleston Sea Buoy.

    *** STATUS REVISED Tue 5/12 1118 AM CHS / 1200 PM JAX cycle.

    🔄 PLAN CHARACTER FLIPPED: Tue refresh shows lighter Thu winds than Mon
    forecast — most of Thu is now BELOW the 7 kt motor crossover.

    📍 ARRIVAL: Fri 6:20 AM EDT — civil dawn at Mayport 6:06 AM Fri, sunrise
    6:25 AM Fri. Arrival 5-14 min before sunrise = TWILIGHT.

    🌊 SEA FROM CORRECTION (major): Earlier synoptic estimates had Sea From
    W/NW (270-315°) assuming the residual E swell would decay by Thursday.
    ACTUAL Wave Detail shows E swell PERSISTING at 2-3 ft @ 7-8s throughout
    Thursday and Friday morning.

    ⚠️ TRADE-OFFS: (1) Departure right at frontal passage (SW→NW transition
    Thu 4-6 AM). AFDCHS confirms benign dry front — no SCAs. (2) Long
    stretches motoring Thu PM and overnight — ~20 gal fuel, well within tank.
