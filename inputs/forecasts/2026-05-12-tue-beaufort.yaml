    WP7:
      zone: AMZ150
      period: FRI_NIGHT
      risk_level: green
      pressure: 30.18
      pressure_trend: Steady
      weather_risk: >
        Wilmington offshore at dawn. Wind N 10-15. Course 053° NE = wind
