    WP5:
      zone: AMZ250
      period: FRI_NIGHT
      risk_level: yellow
      pressure: 30.22
      pressure_trend: Falling slow
      notes_addendum: >
        Frying Pan turn at night. Wind backing N overnight per AMZ150 FRI NIGHT.
      weather_risk: >
        FRYING PAN TURN AT NIGHT. Lighter wind backing N — for 007° N
        course this is wind on the nose. Motor if needed to maintain
        speed through the turn. Verify 41013 buoy for actual conditions.
    WP6:
      zone: AMZ150
      period: FRI_NIGHT
      risk_level: yellow
      pressure: 30.20
      pressure_trend: Falling slow
      weather_risk: >
        Past Frying Pan on 018° course in light N wind. Wind nearly on the
