synopses:
  CHS:
    zone: AMZ300
    text: |
      A cold front far offshore and high pressure passing to our north will
      cause winds and seas to remain elevated through this evening. Conditions
      will improve tonight into Wednesday. Another cold front should quickly
      move through morning Thursday, followed by a broad area of high pressure.
  ILM:
    zone: AMZ200
    text: |
      Post-frontal NE flow today continues to elevate winds and seas with
      SCAs in effect through tonight. Wednesday brings backing E flow and
      improving conditions. A pre-frontal SE/S surge develops Wednesday night
      ahead of a cold front sweeping through Thursday morning. Strong NW flow
      builds behind the front through Friday with another high pressure ridge.
  MHX:
    zone: AMZ100
    text: |
      Strong post-frontal NE gradient over NC waters today with SCAs in effect.
      Backing E to SE Wednesday into Wednesday night as a cold front
      approaches. Front sweeps through Thursday morning with wind shift to NW
      and brief 15-20 kt period in wake of frontal passage. NW flow continues
      Friday with high pressure building. Conditions improve through weekend.
  JAX:
    zone: ""
    text: "(JAX synopsis not applicable to this route)"

afd_marine:
  CHS: |
    Today and tonight: Small Craft Advisories remain in effect into tonight
    for gusty northeast winds behind a cold front. Seas will rapidly build
    this morning, peaking this evening between 4-7 ft across the nearshore
    waters and 7-8 across the outer waters. Marine conditions will gradually
    improve late tonight as high pressure builds southward.
    Extended Marine: Low pressure passes offshore Wednesday with minimal
    additional impact. A cold front should quickly move through the waters
    Thursday morning. Winds and seas shouldn't be high enough to prompt SCAs.
  ILM: |
    SCAs remain in effect through Wednesday morning for the nearshore and
    offshore waters from Little River to Surf City. NE winds 20-25 with gusts
    to 30 kt continue today before backing E Wednesday morning and easing to
    10-15 kt by Wednesday afternoon. Pre-frontal SE/S 10-15 kt Wednesday
    night ahead of a cold front Thursday morning. Wind shift to NW 10-15
    behind the front. Brief period of NW 15-20 kt Thursday afternoon-evening
    possible across outer waters. Improving Friday.
  MHX: |
    SCAs through Wednesday morning for gusty post-frontal NE winds across
    Onslow Bay and Cape Lookout shoals. Conditions improve Wednesday
    afternoon as winds back through E to SE. Pre-frontal SW Wednesday night
    ahead of a cold front Thursday morning with brief NW 15-20 kt and 5-7 ft
    seas Thursday afternoon in wake of frontal passage. NW 10-15 continuing
    Friday. By Saturday winds back through N to NE with high pressure ridge
    building, seas 2-3 ft.
  JAX: ""

