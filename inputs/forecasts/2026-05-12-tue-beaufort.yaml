waypoint_assignments:
  plan_a:
    WP1:
      zone: AMZ350
      period: WED
      risk_level: yellow
      row_band: yellow
      pressure: 30.18
      pressure_trend: Rising slow
      notes_addendum: >
        Post-front clearance — front passed Mon evening ~10 PM, ~32 hr post-front
        at departure. SCAs ended Wed 3 AM per AFDCHS. Residual seas expected.
      weather_risk: >
        Daylight departure into post-frontal E flow. Course 080°T puts wind
        10° off the starboard bow — essentially on the nose. Motor to clear
        the coast. Light residual seas 4-5 ft on the bow. Sporty start.
    WP2:
      zone: AMZ370
      period: WED
      risk_level: yellow
      pressure: 30.18
      pressure_trend: Steady
      weather_risk: >
        Morning leg in 4-5 ft outer seas, E 10-15 kt. Course turn to 042°
        puts wind ~48° off starboard bow — close reach on starboard tack.
        Slow but sailing again.
    WP3:
      zone: AMZ250
      period: WED
      risk_level: yellow
      pressure: 30.15
      pressure_trend: Falling slow
      weather_risk: >
        Mid-afternoon, course 082°T back to nearly east, wind 100° puts it
        18° off the starboard bow — close-hauled or motor. Trough developing.
        Pressure starting to fall.
    WP4:
      zone: AMZ250
      period: WED_NIGHT
      risk_level: yellow
      pressure: 30.10
      pressure_trend: Falling slow
      notes_addendum: >
        Pre-frontal trough developing overnight ahead of Thu morning cold front.
        Wind backing from E through SE to S as front approaches.
      weather_risk: >
        Night transition. Course 072°T with wind backed to SE (157°) = wind
        ~85° off starboard bow — beam reach in 3-4 ft. Comfortable sailing
        finally. Monitor pressure trend at 41013 — if falling fast develops,
        front running early.
    WP5:
      zone: AMZ250
      period: WED_NIGHT
      risk_level: yellow
      row_band: salmon
      pressure: 30.05
      pressure_trend: Falling
      notes_addendum: >
        FRYING PAN TURN — hard left from 072° to 007°. Wind S/SE means
        turn from beam reach onto downwind running geometry.
      weather_risk: >
        TACTICAL HAZARD. Frying Pan turn approach. Wind S/SE 157° with new
        course 007°T = wind 150° off starboard = running before the wind
        on starboard tack. Watch for accidental gybe — main preventer on.
        Verify 41013 Frying Pan reading before committing to 5 NM corner.
    WP6:
      zone: AMZ250
      period: THU
      risk_level: red
      row_band: amber
      pressure: 29.98
      pressure_trend: Falling fast
      notes_addendum: >
        FRONTAL PASSAGE WINDOW. Pressure bottoming somewhere WP5-WP7.
        Wind shifting SW (240°) through W through NW within 2-3 hr.
      weather_risk: >
        ACTIVE FRONTAL PASSAGE. Pressure falling fast, wind shifting fast,
        possible squall band at front. REEF BEFORE FRONT ARRIVES. Course
        018°T with wind SW 240° = wind 138° off port = broad reach (port
        tack now after wind shift). Risk of brief 20+ kt gust band.
    WP7:
      zone: AMZ250
      period: THU
      risk_level: yellow
      pressure: 30.05
      pressure_trend: Rising
      weather_risk: >
        Post-front. Course 053°T with wind SW→W (240°) = wind 173° off port
        = essentially dead downwind. Polar speed drops at dead-run; rig the
        main eased and consider broad-reaching the apparent wind for speed.
        Pressure rising confirms front complete.
    WP8:
      zone: AMZ150
      period: THU
      risk_level: yellow
      pressure: 30.10
      pressure_trend: Rising
      notes_addendum: >
        Across KMHX boundary. AMZ150 THU calls for 15-20 kt in wake of front.
      weather_risk: >
        Onslow Bay open water on 035°T course in post-frontal SW→NW 15-20.
        Wind 170° off port = dead downwind running. Wing-and-wing or broad
        port tack. Heavy following motion in 4-6 ft seas — strap down.
    WP9:
      zone: AMZ150
      period: THU_NIGHT
      risk_level: yellow
      pressure: 30.15
      pressure_trend: Rising slow
      weather_risk: >
        Approaching Beaufort Inlet Thu afternoon (~2 PM). NW 10-15 kt
        holding, seas 3-4 ft. Course adjusts to enter inlet inside Cape
        Lookout shoals. DAY arrival per ETA — safe inlet approach window.

  plan_b:
    WP1:
      zone: AMZ350
      period: FRI
      risk_level: green
      pressure: 30.25
      pressure_trend: Rising slow
      notes_addendum: >
        Post-second-front departure. Second front passed Thu morning, ~24 hr
        post-front at departure. High pressure ridge building.
      weather_risk: >
        Friday morning daylight departure into established NW 10-15 kt.
        Heading 080° E = wind on port quarter, downwind comfortable start.
        Pressure rising under building high.
    WP2:
      zone: AMZ370
      period: FRI
      risk_level: green
      pressure: 30.26
      pressure_trend: Steady
      weather_risk: >
        Morning offshore leg in NW 10-15 kt. Course turn to 042° = wind
        backing onto port beam. Beam reach in 3-4 ft seas. Comfortable
        sailing pace.
    WP3:
      zone: AMZ250
      period: FRI
      risk_level: green
      pressure: 30.26
      pressure_trend: Steady
      weather_risk: >
        Afternoon NW wind holding 10-15. Course 082° E = wind on port quarter
