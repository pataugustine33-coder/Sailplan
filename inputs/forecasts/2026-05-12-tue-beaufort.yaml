plan_commentary:
  plan_a: >
    Plan A — Depart 6:00 AM Wed May 13 from Charleston Sea Buoy.

    🌊 PASSAGE CHARACTER: Mixed sailing with frontal passage in the middle.
    Start in post-frontal E/NE 10-15 kt for a comfortable broad-quarter ride
    up to Frying Pan (WP1-WP4). Pre-frontal trough Wed night brings SE/S
    backing that's actually favorable for the 072° course to WP5.

    ⚠️ FRONTAL PASSAGE MID-PASSAGE: A cold front sweeps through Thu morning
    around WP6 (Past Frying Pan / Cape Fear area). Pressure bottoms here.
    Wind shifts SW→W→NW within 2-3 hr with possible brief gust band. PLAN TO
    REEF BEFORE THE FRONT. Use pressure trace at 41013 Frying Pan buoy as
    front-timing master variable.

    🌊 POST-FRONT: NW 10-15 kt establishes through Thu afternoon. Last 50 NM
    are close-reach on port bow up the NC coast.

    📍 ARRIVAL: Late Thu evening / Fri AM. Total passage ~30-32 hr. Daylight
    arrival depends on actual sailing speeds across the front.

  plan_b: >
    Plan B — Depart 6:00 AM Fri May 15 from Charleston Sea Buoy.

    🌊 PASSAGE CHARACTER: Post-second-front clean sail north with stable
    NW→N→NE rotation. No frontal passages during the transit.

    📍 ARRIVAL: Sat AM. Total passage ~36-38 hr at sailing pace.

    ⚠️ TRADE-OFFS: (1) Wind backs N overnight (Fri night) before SW shift,
    which makes WP5 (Frying Pan turn) and WP6 nearly head-to-wind on the
    007°/018° N courses. May need to motor through the turn. (2) Lighter wind
    than Plan A — longer passage time. (3) Saturday arrival is daylight but
    requires patience through the light-air N leg overnight.
