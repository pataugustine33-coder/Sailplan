# Synoptic: Cold front pushed offshore today (Thu). Post-frontal NW surge tonight
# through Fri AM (reinforcing, brief, gusts <25 kt per all 3 AFDs). High pressure
# builds over weekend; S/SW flow Sat-Sun. No SCAs on route (only Hatteras zones).
# No convective threat after ~8 PM Thu. No tropical activity.
