# Forecast bundle for Charleston-Savannah route, Thu 5/14 PM cycle.
# Pulled fresh via Claude in Chrome at ~9:30 PM EDT Thu 5/14/2026.
#
# Synoptic: Reinforcing dry cold front cleared the area Thu PM (around 5-6 PM EDT
# at Fripp Island per 41033 buoy data). Brief NE wind surge Friday morning
# (gusts <25 kt per AFDCHS), then E 10-15 afternoon as high pressure builds.
# No SCAs or Gale warnings on route. Excellent broad-reach setup for SSW course.

