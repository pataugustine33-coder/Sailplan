afd_marine:
  CHS: |
    A brief NE wind surge will occur Friday morning following a reinforcing
    dry cold front moving through from the north. However, wind gusts
    currently expected to remain below 25 kt. Otherwise, high pressure
    will maintain tranquil marine conditions through the middle of next
    week. Rip Currents: Slightly increasing tidal ranges with the upcoming
    new moon plus modest onshore swell will result in Moderate Risk Friday
    for GA coast and Moderate Risk for all SC/GA beaches on Saturday.

synopses:
  CHS:
    zone: AMZ300
    text: |
      High pressure will build over the area through the middle of next week.
      Reinforcing dry cold front already passed Thu PM; brief NE wind surge
      Friday AM, then high pressure dominates the weekend with light SE/S flow.

waypoint_assignments:
  plan_a:
    WP1:
      zone: AMZ362
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Rising
      notes_addendum: >
        DEPARTURE 12:00 PM EDT Fri 5/15. NE 15-20 g22 for SSW course 212° =
        TWA ~157° running. Pole out for wing-and-wing or set asymmetric.
        Sea state modest 3-4 ft NE 6 sec following sea.
      weather_risk: >
        NE 15-20 broad reach/running on SSW course — favorable downwind setup.
        Brief NE surge gusts to 22 kt well below HR 54 reefing threshold.
    WP2:
      zone: AMZ362
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.13
      pressure_trend: Rising
      notes_addendum: >
        Steady NE flow. HR54 polar at TWS 17 TWA 165° broad reach starboard.
        Sea state modest 3-4 ft NE 6 sec, sea on starboard quarter.
      weather_risk: >
        Steady NE broad reach. Sea state moderate, comfortable downwind.
    WP3:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.16
      pressure_trend: Rising
      notes_addendum: >
        Mid-route. Wind backed to E 10-15 per afternoon forecast.
        Course 227° → TWA = 227-90 = 137° broad reach port tack.
      weather_risk: >
        Wind eased to E 10-15 broad reach. Sea state dropping to 3-4 ft.
    WP4:
      zone: AMZ362
      period: FRI_EVE
      risk_level: green
      row_band: green
      pressure: 30.18
      pressure_trend: Rising
      notes_addendum: >
        Course 237° → TWA = 237-95 = 142° broad reach port tack.
        Seas dropped to 2-3 ft E 7 sec — very comfortable closing leg.
      weather_risk: >
        Excellent point of sail. Seas easing in step with wind.
    WP5:
      zone: AMZ362
      period: FRI_EVE
      risk_level: green
      row_band: green
      pressure: 30.19
      pressure_trend: Rising slow
      notes_addendum: >
        Arrival Tybee Roads / Savannah pilot WP. Fire up engine for the 10 NM
        inbound channel run. Verify channel marker lighting before arrival;
        sun low to west — possible glare during final approach.
      weather_risk: >
        Arrival ~7:30 PM EDT, ~40 min before sunset (8:12 PM EDT). Daylight margin.

plan_commentary:
  plan_a: >
    Plan A — Depart Fri 5/15 12:00 PM EDT from Charleston Sea Buoy heading
    SSW to Tybee Roads / Savannah pilot waypoint (66 NM). Modeled boat speed
    on the HR 54 polar at the forecast wind/sea mix averages 8.0-8.5 kt
    over the passage, yielding an arrival around 7:30 PM EDT Friday
    (~40 minutes before Savannah sunset 8:12 PM EDT). The passage benefits
    from a textbook downwind/broad-reach setup: NE 15-20 kt at departure
    becomes E 10-15 in the afternoon as the post-frontal high pressure
    builds; sea state is modest 3-4 ft NE → 2-3 ft E with periods 6-7 sec.
    No SCA or Gale forecast through the weekend. Cautions: (1) NE surge
    gusts to ~22 kt early in the passage — well below HR 54 reefing
    threshold; (2) approach into Tybee Roads near sunset, verify channel
    marker lighting and watch for sun glare from the west during final
    approach. The HR54's 830 NM motor range gives substantial reserve;
    even fully motoring would burn <8% of fuel capacity.
