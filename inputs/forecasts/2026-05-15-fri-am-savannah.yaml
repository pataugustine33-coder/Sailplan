# Forecast bundle for Charleston-Savannah route, Fri 5/15 AM cycle (T-3 hours from departure).
# Pulled fresh via Claude in Chrome at ~7:00 AM EDT Fri 5/15/2026.
#
# Synoptic: NE surge is ACTIVE. Reinforcing dry cold front passed Thursday evening
# (visible at Fripp Island 41033 ~6 PM EDT Thu). Post-frontal NE wind surge developed
# overnight as forecast. SMALL CRAFT ADVISORY now in effect for AMZ360/362/364 until
# 10 AM EDT today. Buoy 41033 saw peak gust 31 kt at 7 AM. AFDCHS confirms 25-30 kt
# gusts across nearshore waters this morning.
#
# Wind diminishes after 10 AM: NE 15-20 g25 morning → E 10-15 afternoon → SE 5-10 evening.
# Seas peak 4-5 ft NE 6 sec morning → 3-4 ft NE/E mixed afternoon → 2-3 ft E 7 sec evening.
# High pressure builds through weekend and into next week — no further marine concerns.

