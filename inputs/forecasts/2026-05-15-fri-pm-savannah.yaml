# Forecast bundle for Charleston-Savannah route — Fri 5/15 PM cycle.
# Pulled fresh via Claude in Chrome at ~2:30 PM EDT Fri 5/15/2026.
#
# MAJOR CHANGE from AM cycle: SCA cancelled (AFD MARINE...None).
# Morning surge collapsed faster than the 4:29 AM cycle predicted.
# Buoy ground truth at 2 PM showed 41033 Fripp already easing to 050°/15 kt
# from its 7 AM peak of 31 kt gust. By 6 PM all three route buoys reading
# 8-13 kt with seas 3-4 ft.
#
# Forward outlook: AFD calls "quiet marine conditions through middle of
# next week, wind mostly 10-15 kt, seas 2-3 ft." Onshore SE flow under
# subtropical high pressure to the east.

