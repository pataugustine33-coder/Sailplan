afd_marine:
  CHS: |
    Overall, quiet marine conditions will prevail across the local waters
    through the middle of next week. Subtropical high pressure to the east
    will drive onshore southeasterly flow each day, with wind speeds
    mostly topping out in the 10-15 knot range. Each afternoon and evening
    there could be some local enhancement along the land/sea interface
    with the diurnal sea breeze. Seas should average 2-3 feet through the
    period. Rip Currents: Moderate Risk Saturday and Sunday under new-moon
    influences plus persistent onshore flow.

synopses:
  CHS:
    zone: AMZ300
    text: |
      High pressure will remain the primary feature across the area through
      the middle of next week. The morning NE wind surge has cleared; SCA
      is no longer in effect. Subtropical high pressure to the east drives
      onshore SE flow with light to moderate wind through the weekend.

# ============================================================
# Waypoint forecast assignments per plan
# Plan A: 10:00 AM EDT depart — boat would have been mid-passage during
#   the surge collapse; using FRI_PM (post-surge) for all WPs except WP1.
# Plan B: 12:00 PM EDT depart — entirely post-surge.
# Both plans now show quiet marine conditions.
# ============================================================
waypoint_assignments:
  plan_a:
    WP1:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.07
      pressure_trend: Rising slow
      notes_addendum: >
        DEPARTURE 10:00 AM EDT Fri 5/15. The morning NE surge was actually
        easing faster than 4:29 AM AM-cycle forecast — observed at noon at
        41033 Fripp the wind had already dropped from 17 kt to 14 kt with
        gusts 21 kt. By WP1 departure conditions are NE/E 5-10 kt easing,
        seas 3-4 ft. Course 212° → TWA ~150° broad reach. Conditions much
        more benign than this morning's plan suggested.
      weather_risk: >
        Quiet onshore E flow as morning surge collapsed. Broad-reach setup
        on SSW course. Comfortable departure.
    WP2:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Rising slow
      notes_addendum: >
        E 5-10 kt steady. Course 220° → TWA ~130° broad reach port tack.
        Seas 3-4 ft E 7 sec — comfortable broad sea on port quarter.
      weather_risk: "Steady benign E flow. Comfortable broad reach."
    WP3:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.12
      pressure_trend: Rising slow
      notes_addendum: >
        Mid-route. E 5-10 kt continues. Course 227° → TWA ~137° broad reach.
        May need to motor-sail in lulls (below 6-7 kt TWS = motor crossover).
      weather_risk: "Light E flow. Possible motor-sail in lulls."
    WP4:
      zone: AMZ362
      period: FRI_EVE
      risk_level: green
      row_band: green
      pressure: 30.14
      pressure_trend: Rising slow
      notes_addendum: >
        Approach. SE 5-10 kt evening. Course 237° → TWA ~102° beam reach.
        Seas easing to 2-3 ft. Boat likely motor-sailing.
      weather_risk: "Beam reach SE 5-10. Wind on threshold for sailing vs. motor."
    WP5:
      zone: AMZ362
      period: FRI_EVE
      risk_level: green
      row_band: green
      pressure: 30.15
      pressure_trend: Steady
      notes_addendum: >
        Arrival Tybee Roads sea buoy. Engine on for 10 NM channel run to
        Thunderbolt / Savannah waterfront. Verify channel marker lighting
        though arrival is well before sunset (8:12 PM EDT).
      weather_risk: "Daylight arrival, benign conditions."

  plan_b:
    WP1:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Rising slow
      notes_addendum: >
        DEPARTURE 12:00 PM EDT Fri 5/15. By noon the morning surge had
        already eased significantly — 41033 Fripp dropping through 14 kt
        with gusts 21 kt. Course 212° → TWA ~150° broad reach. Comfortable
        post-surge departure.
      weather_risk: "Benign post-surge departure. Comfortable broad reach."
    WP2:
      zone: AMZ362
      period: FRI_PM
      risk_level: green
      row_band: green
      pressure: 30.12
      pressure_trend: Rising slow
      notes_addendum: >
        E 5-10 kt. Seas 3-4 ft E 7 sec. TWA ~130°.
      weather_risk: "Steady E flow, broad reach."
    WP3:
      zone: AMZ362
      period: FRI_EVE
      risk_level: green
      row_band: green
      pressure: 30.14
      pressure_trend: Rising slow
      notes_addendum: >
        Mid-route. Wind easing further SE 5-10. May motor-sail.
      weather_risk: "Light SE flow. Probable motor-sail."
    WP4:
      zone: AMZ362
      period: FRI_EVE
      risk_level: yellow
      row_band: yellow
      pressure: 30.15
      pressure_trend: Steady
      notes_addendum: >
        Approach phase, light wind. Likely motoring.
      weather_risk: "Light wind, motoring expected."
    WP5:
      zone: AMZ362
      period: FRI_NIGHT
      risk_level: red
      row_band: red
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        ARRIVAL TWILIGHT/NIGHT — ETA ~8:30 PM EDT, near civil dusk
        (8:40 PM Savannah). Channel approach in low-light conditions.
      weather_risk: "⚠️ Arrival in twilight. Channel approach low-light."

plan_commentary:
  plan_a: >
    Plan A — Depart Fri 5/15 10:00 AM EDT. Originally this plan accepted
    a "right at SCA expiration" departure to secure a daylight arrival.
    The fresh 2:24 PM cycle shows the SCA was cancelled altogether and
    the surge collapsed faster than the AM forecast — by noon at 41033
    Fripp Island the wind had already dropped 3 kt from the morning peak,
    and by 4 PM it was down to 8 kt. The 10 AM departure thus encountered
    only the tail end of a fading surge, with conditions becoming benign
    quickly. Modeled arrival ~6:30 PM EDT green with comfortable
    daylight margin (1h42 before sunset 8:12 PM).
  plan_b: >
    Plan B — Depart Fri 5/15 12:00 PM EDT. Fresh data confirms noon
    departure encountered post-SCA-collapse conditions (NE 14 g21 at
    Fripp easing within an hour). Passage proceeds in light E/SE flow
    likely requiring motor-sail in the back half. Modeled arrival
    ~8:30 PM EDT — still on the twilight boundary. Plan A remains
    preferable for arrival window. Note: light evening wind means
    motor fuel burn slightly higher than Plan A.
