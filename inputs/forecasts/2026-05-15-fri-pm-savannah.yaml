  label: "Fri 5/15 PM cycle (CHS 224 PM)"
  cwfchs:
    issued: "2026-05-15T14:24:00-04:00"
    label_short: "Fri 5/15 224 PM"
    label_full: "224 PM EDT Fri May 15 2026"
  afdchs:
    issued: "2026-05-15T14:19:00-04:00"
    label_short: "Fri 5/15 219 PM"
    label_full: "219 PM EDT Fri May 15 2026"

