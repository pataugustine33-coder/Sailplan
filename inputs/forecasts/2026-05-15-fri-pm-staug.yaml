# ============================================================
# Waypoint forecast assignments per plan
# Plan A: 10:00 AM EDT Sat 5/16 — overnight passage, arrival Sun afternoon
# Plan B: 6:00 AM EDT Sun 5/17 — early start sensitivity, arrival Mon
# ============================================================
waypoint_assignments:
  plan_a:
    WP1:
      zone: AMZ362
      period: SAT
      risk_level: green
      row_band: green
      pressure: 30.05
      pressure_trend: Steady
      notes_addendum: >
        Sat afternoon. SE 5-10 kt, seas 2-3 ft. Course 212° → TWA ~77°
        close-to-beam reach starboard tack. Below motor crossover most
        of leg — expect motor-sail or motor.
      weather_risk: >
        Light SE flow. Comfortable. Motor likely necessary in lulls.
    WP2:
      zone: AMZ362
      period: SAT
      risk_level: green
      row_band: green
      pressure: 30.07
      pressure_trend: Steady
      notes_addendum: >
        Sat early evening. SE 5-10 kt continues. Course 220° → TWA ~85°
        beam reach. Seas 2-3 ft, comfortable.
      weather_risk: "Steady benign SE flow. Comfortable beam reach."
    WP3:
      zone: AMZ364
      period: SAT_NIGHT
      risk_level: green
      row_band: green
      pressure: 30.08
      pressure_trend: Steady
      notes_addendum: >
        Sat night, mid-passage near Grays Reef. SE 8-10 kt steady.
        Course 216° → TWA ~81° beam-reach. Seas 2-3 ft. Watch for any
        diurnal sea-breeze enhancement after sunset has fully decayed.
      weather_risk: "Night transit at Grays Reef. Light SE, manageable."
    WP4:
      zone: AMZ450
      period: SUN
      risk_level: green
      row_band: green
      pressure: 30.05
      pressure_trend: Falling slow
      notes_addendum: >
        Sun morning, crossing into JAX waters. SE 5-10 kt easing from
        sportier overnight conditions. Course 200° → TWA ~65° close
        reach. Seas 3-4 ft occ 5 — heavier than CHS waters.
      weather_risk: >
        Crossing into JAX waters. Seas building to 3-4 ft. Close-reach
        starboard tack.
    WP5:
      zone: AMZ450
      period: SUN
      risk_level: green
      row_band: green
      pressure: 30.03
      pressure_trend: Falling slow
      notes_addendum: >
        Sun late morning. SE 5-10 kt. Course 197° → TWA ~62° close reach.
        Cumberland Island offshore. Seas 3-4 ft.
      weather_risk: "Close reach in lighter wind. Comfortable."
    WP6:
      zone: AMZ452
      period: SUN
      risk_level: yellow
      row_band: yellow
      pressure: 30.02
      pressure_trend: Falling slow
      notes_addendum: >
        Sun midday, passing Mayport offshore. Entering AMZ452 — SE 10-15
        kt freshens. Course 175° → TWA ~40° close-hauled. Seas 3-4 ft
        occ 5 ft, SE 4 ft @ 8 sec from forward starboard quarter.
      weather_risk: >
        Wind freshens in FL waters. Close-hauled course due south. May
        be uncomfortable upwind motion in 3-4 ft seas.
    WP7:
      zone: AMZ452
      period: SUN
      risk_level: yellow
      row_band: yellow
      pressure: 30.00
      pressure_trend: Falling slow
      notes_addendum: >
        Arrival St Augustine Sea Buoy. SE 10-15 kt. Seas 3-4 ft occ 5.
        Verify channel marker lighting and sea state at inlet — St
        Augustine Inlet is shoaling-prone. Approach in daylight required.
      weather_risk: >
        Arrival in fresh SE wind and 3-4 ft seas. St Augustine Inlet
        approach demands attention.

  plan_b:
    WP1:
      zone: AMZ362
      period: SAT
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Steady
      notes_addendum: >
        Sun mid-morning (Plan B). SE 5-10 kt. Course 212° → TWA ~77°
        close-to-beam reach. Similar to Plan A WP1 conditions.
      weather_risk: "Light SE, motor-sail likely."
    WP2:
      zone: AMZ364
      period: SAT
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Steady
      notes_addendum: "Sun afternoon. SE 8-10 kt. Beam reach."
      weather_risk: "Steady SE flow."
    WP3:
      zone: AMZ364
      period: SAT_NIGHT
      risk_level: green
      row_band: green
      pressure: 30.08
      pressure_trend: Steady
      notes_addendum: "Sun night. Near Grays Reef. SE 8-10 kt."
      weather_risk: "Night transit, light SE."
    WP4:
      zone: AMZ450
      period: SUN
      risk_level: green
      row_band: green
