# Forecast bundle for Charleston-StAugustine route — Fri 5/15 PM cycle.
# Multi-office bundle covering both CHS (north half) and JAX (south half).
# Pulled fresh via Claude in Chrome 5/15 PM EDT.
#
# Synopsis: Bermuda high to the east drives persistent SE onshore flow.
# CHS waters benign (SE 5-10, seas 2-3 ft). JAX waters sportier
# (SE 10-15, seas 3-4 ft occ 5 — afternoon/evening surge mentioned in
# AFDJAX). Gulf Stream stays 50-70 NM east of FL coast, well outside route.
#
# New moon 5/16 + perigee 5/17 drives elevated tides — Coastal Flood
# Advisory active for Charleston tonight, may persist Sat/Sun evenings.

