plan_commentary:
  plan_a: |
    Sat 10:00 AM EDT departure. Overnight passage. CHS waters quiet
    (SE 5-10 kt, seas 2-3 ft) for first ~100 NM. After WP4 enters JAX
    waters where conditions stiffen to SE 10-15 kt with 3-4 ft seas
    occ 5 ft — close-reaching south. Expected arrival St Augustine
    Sea Buoy Sunday afternoon in daylight. Last 30 NM are
    close-hauled SE 10-15 kt — sportier than the rest. St Augustine
    Inlet shoals require attention on approach.
  plan_b: |
    Sun 6:00 AM EDT alternate. Same route, one day later. Gets the boat
    in late Monday afternoon with similar conditions but cooler air
    and lower tides. Daylight arrival assured. Trade-off: one extra
    day at the dock.
