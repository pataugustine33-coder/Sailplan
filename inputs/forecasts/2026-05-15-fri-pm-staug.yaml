afd_marine:
  CHS: |
    Overall, quiet marine conditions will prevail across the local waters
    through the middle of next week. Subtropical high pressure to the east
    will drive onshore southeasterly flow each day, with wind speeds mostly
    topping out in the 10-15 knot range. Each afternoon and evening there
    could be some local enhancement along the land/sea interface with the
    diurnal sea breeze. Seas should average 2-3 feet through the period.
  JAX: |
    High pressure shifts eastward off the southeastern seaboard, continuing
    to move well east of the region this weekend. This will result in east
    to southeast winds persisting into the weekend and early next week.
    Afternoon and evening wind surges this weekend may bring periods of
    caution conditions to the near shore waters. Isolated showers and
    thunderstorms may be possible in this onshore wind flow by late in the
    weekend and next week.

synopses:
  CHS:
    zone: AMZ300
    text: |
      High pressure will remain the primary feature across the area through
      the middle of next week. New moon 5/16 + perigee 5/17 elevates tide
      levels — Coastal Flood Advisory active for Charleston tonight, may
      extend Sat/Sun evenings.
  JAX:
    zone: AMZ400
    text: |
      Strengthened NE to E winds today as high pressure builds north of the
      waters. High pressure shifts E by this evening and moves well east of
      the region this weekend, yielding persistent SE flow. Afternoon and
      evening wind surges this weekend may bring caution conditions near
      shore. Isolated showers/tstms possible late weekend in onshore flow.

