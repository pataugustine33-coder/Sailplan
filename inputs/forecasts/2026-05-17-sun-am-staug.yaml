    label_short: "Sun 5/17 610 AM"
    label_full: "610 AM EDT Sun May 17 2026"
  afdjax:
    issued: "2026-05-17T00:08:00-04:00"
    label_short: "Sun 5/17 1208 AM"
    label_full: "1208 AM EDT Sun May 17 2026"

