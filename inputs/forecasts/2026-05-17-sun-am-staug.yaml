plan_commentary:
  plan_a: |
    Sun 5/17 5:00 PM EDT departure (TONIGHT). Overnight transit Sun-Mon
    through quiet CHS waters (SE 5-10 kt, seas 3 ft). Wind veers SE→E by
    Monday morning — favorable, turning what would have been a close-
    hauled FL leg into a beam reach. Arrival Mon 6:16 PM EDT at St
    Augustine Sea Buoy STA with ~1h52m of daylight before sunset 8:08 PM.
    Last 30 NM in FL waters (AMZ452) are E 10-15 kt, seas 3-4 occ 5 ft
    on a 6-sec short-period chop — sportier than CHS waters but well
    within HR48 envelope and on the beam, not upwind. JAX office SCEC
    expires LATE TONIGHT, well before we enter the affected zone.
  plan_b: |
    Mon 5/18 6:00 AM EDT alternate (delay 13 hours). All CHS conditions
    similar. Trade-off: arrival shifts to Tue 7:18 AM dawn instead of Mon
    6:16 PM late-afternoon — both daylight, but Plan A gives more flexible
    arrival window. Plan B has overnight transit through JAX waters in
    SE 5-10 night-time wind. No real advantage over Plan A for the
    current forecast.
