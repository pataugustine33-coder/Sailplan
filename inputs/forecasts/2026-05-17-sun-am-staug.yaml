  label: "Sun 5/17 AM cycle (CHS 503 AM, JAX 226 AM)"
  cwfchs:
    issued: "2026-05-17T05:03:00-04:00"
    label_short: "Sun 5/17 503 AM"
    label_full: "503 AM EDT Sun May 17 2026"
  cwfjax:
    issued: "2026-05-17T02:26:00-04:00"
    label_short: "Sun 5/17 226 AM"
    label_full: "226 AM EDT Sun May 17 2026"
  afdchs:
