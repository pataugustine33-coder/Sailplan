# Forecast bundle for Charleston-StAugustine — Sun 5/17 AM cycle.
# Multi-office bundle covering both CHS (north half) and JAX (south half).
# Pulled fresh via Claude in Chrome Sun 5/17 around 7-8 AM EDT.
#
# Synopsis: Bermuda high firmly established to the east. Persistent onshore
# SE flow today, veering to E by Monday afternoon. CHS waters quiet
# (SE 5-10 kt, seas 2-3 ft). JAX inshore zones currently under SCEC
# (SE 15-20 kt, seas 4 occ 5 ft) but SCEC expires LATE TONIGHT — by the
# time Plan A reaches AMZ452 (Mon 2 PM) wind is E 10-15 kt, no SCEC.
#
# Wind veering from SE → E on Monday is FAVORABLE for our southbound
# course (course ~175-200° at WPs 4-7): turns close-hauled into beam reach.
#
# Hazards: 1) Tonight Sun PM inland thunderstorms over GA along I-75
# corridor — well west of our offshore track. 2) New moon 5/16 + perigee
# 5/17 → minor coastal flooding tonight/Mon evening at Charleston Harbor
# tide gauge (relevant for departure water level, not the offshore passage).
# 3) High rip current risk at all FL/GA beaches through Mon — bears on
# inlet approach at St Augustine.

