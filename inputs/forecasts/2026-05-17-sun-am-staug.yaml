# ============================================================
# Waypoint forecast assignments per plan
# Plan A: Sun 5/17 5:00 PM EDT depart — overnight transit, Mon afternoon
#   arrival St Augustine in daylight (~2 hr before sunset)
# Plan B: Mon 5/18 6:00 AM EDT — sensitivity comparison (wait one day)
# ============================================================
waypoint_assignments:
  plan_a:
    WP1:
      zone: AMZ362
      period: SUN_NIGHT
      risk_level: green
      row_band: green
      pressure: 30.13
      pressure_trend: Steady
      notes_addendum: >
        Sun 8:47 PM (3.8 hr in). Just past sunset (Charleston sunset
        ~8:13 PM). SE 5-10 kt, seas 3 ft. Course 205° → TWA ~70°
        close-to-beam reach starboard. Below motor crossover most of
        leg — likely motor-sail.
      weather_risk: >
        Quiet SE flow at dusk. Motor crossover may be needed in lulls
        below 7 kt TWS.
    WP2:
      zone: AMZ362
      period: SUN_NIGHT
      risk_level: green
      row_band: green
      pressure: 30.12
      pressure_trend: Steady
      notes_addendum: >
        Mon 12:34 AM (7.6 hr in). Midnight overnight CHS waters. SE
        5-10 kt steady. Course 212° → TWA ~77° close-to-beam reach.
        Seas 3 ft from SE @ 8s — long-period swell on the forward
        starboard quarter, comfortable.
      weather_risk: "Quiet overnight transit. Steady SE."
    WP3:
      zone: AMZ364
      period: MON
      risk_level: green
      row_band: green
      pressure: 30.12
      pressure_trend: Steady
      notes_addendum: >
        Mon 5:58 AM (13.0 hr in). Dawn approaches near Grays Reef
        NMS. Wind shifting from SE to E. Course 220° → TWA ~110°
        beam reach (wind on starboard beam). Seas 3 ft.
      weather_risk: >
        Dawn transit at Grays Reef. Wind shift SE→E favorable.
        Beam reach starboard.
    WP4:
      zone: AMZ450
      period: MON
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend: Steady
      notes_addendum: >
        Mon 9:29 AM (16.5 hr in). Crossing into JAX waters AMZ450.
        E 5-10 kt — lighter than overnight CHS. Course 216° → TWA
        ~126° broad reach. Seas 3-4 ft occ 5. Likely motor in light
        air patches.
      weather_risk: >
        Crossing into JAX waters in lighter air. Seas building to
        3-4 ft occ 5. Broad reach.
    WP5:
      zone: AMZ450
      period: MON
      risk_level: green
      row_band: green
      pressure: 30.08
      pressure_trend: Steady
      notes_addendum: >
        Mon 12:28 PM (19.5 hr in). E 5-10 kt continues. Course 200°
        → TWA ~110° beam reach. Cumberland Island offshore. Seas
        3-4 ft. Late-morning to noon transit.
      weather_risk: "Beam reach in lighter E wind. Comfortable."
    WP6:
      zone: AMZ452
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.05
      pressure_trend: Steady
      notes_addendum: >
        Mon 2:13 PM (21.2 hr in). Entering AMZ452 — wind freshens
        to E 10-15 kt. Course 197° → TWA ~93° beam reach (much
        better than the close-hauled the SE-wind scenario would
        have produced). Seas 3-4 ft occ 5 from E @ 6 sec.
      weather_risk: >
        Wind freshens entering FL waters. Beam-reach E 10-15 kt.
        Short-period 6 sec seas — somewhat lumpy but manageable
        for HR48.
    WP7:
      zone: AMZ452
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.03
      pressure_trend: Steady
      notes_addendum: >
        Mon 6:16 PM (25.3 hr in). Arrival St Augustine Sea Buoy STA.
        Sunset at St Augustine 8:08 PM — 1h52m daylight margin. E
        10-15 kt, seas 3-4 ft. Inlet approach in daylight required —
        St Aug Inlet is shoaling-prone. HIGH rip current risk in
        area today/Mon per AFDJAX.
      weather_risk: >
        Daylight arrival with ~2 hr sunset buffer. Inlet shoals
        and rip currents demand attention on approach.

  plan_b:
