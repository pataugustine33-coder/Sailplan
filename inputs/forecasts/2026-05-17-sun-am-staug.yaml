afd_marine:
  CHS: |
    Through Tonight: No concerns with high pressure centered well offshore
    keeping a typical summer-like southerly flow regime in place. Sea
    breeze enhancements likely along the land/sea interface and Charleston
    Harbor this afternoon. Winds largely remain less than 10 kt (except
    10-15 kt in Charleston Harbor this afternoon) with seas 2-4 ft.
    Monday through Friday: No marine concerns expected. SE flow each day,
    wind 10-15 kt range, seas 2-4 ft.
  JAX: |
    High pressure ridge will extend its axis across the southeastern states
    today through middle next week, keeping persistent onshore wind flow
    with late afternoon and evening wind surges expected. Isolated showers
    and thunderstorms possible early-to-middle next week. Frontal boundary
    moves over the southeast late next week, gradually increasing rain
    chances.

synopses:
  CHS:
    zone: AMZ300
    text: |
      High pressure will extend across the region through the week.
      Persistent SE onshore flow today and Monday. New moon 5/16 + perigee
      5/17 → minor coastal flooding evening high tides tonight/Mon at
      Charleston Harbor tide gauge.
  JAX:
    zone: AMZ400
    text: |
      High pressure ridge across the southeast through mid-next-week.
      Persistent onshore wind flow with late afternoon/evening surges.
      Wind veers SE → E by Monday — favorable for southbound passage.

