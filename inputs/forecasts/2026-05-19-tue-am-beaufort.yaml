# passage; Plan A departs 3 PM Tue, Plan B departs 9 PM Tue. WP→period
# different.
#
# Plan A (Tue 3 PM): WP1-2 TUE → WP3-4 TUE_NIGHT → WP5-7 WED → WP8 WED_NIGHT → WP9 THU
# Plan B (Tue 9 PM): WP1-2 TUE_NIGHT → WP3-4 WED → WP5-7 WED → WP8 WED_NIGHT → WP9 THU

waypoint_assignments:
  # ============================================================
  # PLAN A: Tue 3 PM departure (as requested) — slow tempo to time
  # arrival to Thu 6:30 AM dawn at Beaufort.
  # ============================================================
  plan_a:
    WP1:
      zone: AMZ360
      period: TUE
      risk_level: green
      pressure: 30.28
      pressure_trend: Steady
      notes_addendum: >
        Tue 3 PM departure from Charleston Sea Buoy. Charleston tide LW 4:47 PM
        — STRONG EBB at jetties, ~+1.0 kt push out for first 2 hr.
        CHTS1 live 8:30 AM: NE 2 kt G3, P=30.28. Bermuda High signature.
      weather_risk: >
        Strong high pressure, ebb push, benign exit. No SCAs, no convection,
        front timing >48 hr away.
    WP2:
      zone: AMZ360
      period: TUE
      risk_level: green
      pressure: 30.27
      pressure_trend: Steady
      notes_addendum: >
        Tue ~6:30 PM at 25 NM offshore. Sea breeze enhancement per AFDCHS
        ("local enhancement along land/sea interface with the diurnal sea
        breeze"). SE 10 sea breeze on port quarter. Course bends to 042° NE.
      weather_risk: >
        Sea breeze enhancement; clear, dry, no convection. SE 3 ft @ 8s long
        swell.
    WP3:
      zone: AMZ256
      period: TUE_NIGHT
      risk_level: green
      pressure: 30.26
      pressure_trend: Steady
      notes_addendum: >
        Wed ~0:18 AM (slow tempo from here to time dawn arrival). Overnight
        decoupling per CHS/ILM AFDs — winds 5 kt or less.
      weather_risk: >
        Calm overnight, ridge intact, no fronts within 60 hr.
    WP4:
      zone: AMZ280
      period: TUE_NIGHT
      risk_level: green
      pressure: 30.26
      pressure_trend: Steady
      notes_addendum: >
        Wed ~8:14 AM at Frying Pan approach. Light S overnight to dawn.
        Live buoy 41013 (8:40 AM Tue): S 4 kt, swell 2.3 ft @ 9.1s ESE
        — verifies forecast SE 3 ft @ 9s.
      weather_risk: >
        Calm at dawn; Frying Pan turn handled in daylight.
    WP5:
      zone: AMZ280
      period: WED
      risk_level: green
      pressure: 30.27
      pressure_trend: Steady
      notes_addendum: >
        Wed ~1:36 PM at Frying Pan offshore turn (5 NM E of light tower).
        Mid-day passage in daylight. Sea breeze beginning, S 6-9 kt.
      weather_risk: >
        Daytime turn, light favorable wind, no convection.
    WP6:
      zone: AMZ280
      period: WED
      risk_level: green
      pressure: 30.27
      pressure_trend: Steady
      notes_addendum: >
        Wed ~5:29 PM past Frying Pan. Course turns N (007°). Sea breeze peak.
        Wind dead astern, wing-on-wing or motor-sail.
      weather_risk: >
        Sea breeze build, no convection; near-running point of sail.
    WP7:
      zone: AMZ280
      period: WED
      risk_level: green
      pressure: 30.27
      pressure_trend: Steady
      notes_addendum: >
        Wed ~8:27 PM at Wilmington offshore. Evening, sea breeze relaxing.
        Live buoy 41037 (8:08 AM Tue): W 2 kt — overnight calm pattern
        expected to return.
      weather_risk: >
        Evening relaxation; no convective signals on extended outlook.
    WP8:
      zone: AMZ188
      period: WED_NIGHT
      risk_level: green
      pressure: 30.26
      pressure_trend: Steady
      notes_addendum: >
        Thu ~1:00 AM at Onslow Bay. MHX AFD KEY MSG 3: front begins to drop
        south Thu — slower than earlier forecasts; not yet impacting.
      weather_risk: >
        Front timing slipped to Thu PM/night — well clear of our arrival.
    WP9:
      zone: AMZ158
      period: THU
      risk_level: yellow
      row_band: yellow
      pressure: 30.25
      pressure_trend: Falling slow
      notes_addendum: >
        ARRIVAL Thu ~6:30 AM EDT — civil twilight 5:42, sunrise 6:08.
        Beaufort tide HW 12:30 PM Thu — entering on rising tide.
        CRITICAL: MHX AFD KEY MSG 1 warns dense fog risk early AM with
        light winds. Have radar + AIS up, slow approach, monitor 16.
      weather_risk: >
        Dawn arrival window MET but fog risk per MHX AFD — slow approach,
        radar/AIS active.

  # ============================================================
  # PLAN B: Tue 9 PM departure (RECOMMENDED) — straight motor at 6 kt,
  # arrival Thu 9:42 AM EDT. Daylight Frying Pan turn, post-fog arrival,
  # flood-tide-assisted Beaufort Inlet entry.
  # ============================================================
  plan_b:
    WP1:
      zone: AMZ360
      period: TUE_NIGHT
      risk_level: green
      pressure: 30.27
      pressure_trend: Steady
      notes_addendum: >
