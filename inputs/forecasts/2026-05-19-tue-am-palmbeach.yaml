afd_marine:
  MFL: |
    Small Craft Exercise Caution conditions are expected to continue
    through the rest of today across the Atlantic waters due to
    persistent easterly winds of 15 to 20 kts. Winds look to weaken
    slightly for the latter half of the week. Isolated weak showers
    are possible for the Gulfstream waters through the morning each
    day this week. During the afternoon, thunderstorms will favor the
    Gulf coast and Gulf waters, where gusty and erratic winds will be
    possible with any storm. Atlantic seas will be 2-4 feet through
    the rest of the week.

synopses:
  MFL:
    zone: AMZ600
    text: |
      Small Craft Exercise Caution conditions over the Atlantic
      waters through Tuesday night as a moderate easterly breeze
      dominates the wind flow pattern. Isolated to scattered showers
      possible overnight and morning across Atlantic waters as they
      move from east to west. Afternoon thunderstorms favor Gulf
      waters under easterly regime. Gulf Stream Hazards: None.

gulf_stream:
