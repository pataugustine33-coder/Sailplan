        crossover in early-morning lulls below 7 kt TWS.
      weather_risk: >
        Dawn departure Lake Worth Inlet. Quiet morning beam reach.
    WP1:
      zone: AMZ650
      period: WED
      risk_level: green
      row_band: green
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 8:03 AM (2.1 hr in). Dawn departure means lighter morning
