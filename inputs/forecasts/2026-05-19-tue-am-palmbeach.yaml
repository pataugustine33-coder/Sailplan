plan_commentary:
  plan_a: |
    Wed 5/20 9:00 AM EDT departure (user requested). Arrival Port
    Everglades Sea Buoy PE at ~3:21 PM EDT — mid-afternoon, 4h39m
    daylight margin to 8:00 PM sunset. Route hugs Gulf Stream west
    wall (7-10 NM offshore per MFL 5/18 position bulletin) for ~1-2
    kt south-flowing current assist on legs WP1→WP4.

    Wind E 10-15 kt steady (SCEC has eased from Tue values for WED
    period). Course mostly 180-200° → TWA ~90-110° beam-to-broad reach
    starboard tack the entire passage. Seas 2-3 ft from E at 5 sec
    period — short-period wind-driven chop on starboard beam, not
    stacked seas. Wind is perpendicular-to-crossing the Stream axis,
    NOT opposing it, so no standing-seas hazard.

    Plan A clears Port Everglades well before afternoon thunderstorm
    risk per AFDMFL (storms favor interior/SW FL under easterly
    regime). Yellow bands at WP1-WP3 reflect 5-sec short-period
    seas typical of trade-wind chop — comfortable for HR48 but
    bears noting; green at arrival reflects easing seas and
    daylight margin.
  plan_b: |
    Wed 5/20 6:00 AM EDT dawn departure (sensitivity). Arrives Port
    Everglades 12:21 PM — mid-day, 7h39m daylight margin. Advantage:
    completes passage entirely in the lightest, calmest part of the
    daily diurnal cycle, before sea-breeze builds the easterly to its
    afternoon peak. Disadvantage: morning lulls may require more
    motor time below 7 kt TWS crossover. Both plans are operationally
    sound; Plan A is the requested baseline.
