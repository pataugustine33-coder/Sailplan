# ============================================================
# Waypoint forecast assignments per plan
# Plan A: Wed 5/20 9:00 AM EDT depart — arrives 3:21 PM same day
# Plan B: Wed 5/20 6:00 AM EDT dawn depart — arrives 12:21 PM same day
# Note: All Plan A WPs use WED period since entire passage is within
# 6.5 hours, completing well before WED_NIGHT begins.
# ============================================================
waypoint_assignments:
  plan_a:
    WP0:
      zone: AMZ650
      period: WED
      risk_level: green
      row_band: green
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 9:00 AM EDT departure Lake Worth Inlet. Course 176° south
        toward Stream west edge. E 10-15 kt = TWA ~86° beam reach
        starboard. Seas 2-3 ft E @ 5 sec. LKWF1 buoy (10 NM N) reads
        E 13 G 17 at 10:30 AM the day before — consistent with WED
        forecast easing.
      weather_risk: >
        Departure Lake Worth Inlet. Beam reach E 10-15 kt. Watch for
        coastal traffic and divers exiting the inlet.
    WP1:
      zone: AMZ650
      period: WED
      risk_level: yellow
      row_band: yellow
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 11:03 AM (2.1 hr in). Course 186° → TWA ~96° on E 10-15 kt
        wind = beam reach starboard. Just inside Stream west edge,
        starting to feel ~0.5-1 kt south assist. Seas 2-3 ft from E
        @ 5 sec — short-period chop on the beam, not stacking.
        Secondary NW 1 ft @ 5s minor. Sea Angle 90° (NWS Wave Detail
        primary).
      weather_risk: >
        Beam reach in E 10-15 kt, short-period 5s chop on starboard
        beam. SCEC has eased to non-advisory for WED period.
        Comfortable HR48 conditions.
    WP2:
      zone: AMZ650
      period: WED
      risk_level: yellow
      row_band: yellow
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 12:54 PM (3.9 hr in). Course 202° → TWA ~112° broad-of-beam
        reach. Now fully inside Stream edge, ~1.5-2 kt south assist
        expected here. Seas 2-3 ft from E @ 5 sec on starboard beam-
        aft quarter. Comfortable broad reach.
      weather_risk: >
        Stream assist developing. Broad-of-beam reach starboard.
        Watch for late-morning isolated showers per AFDMFL but
        coastal SE FL is east-coast — sea-breeze convection favors
        interior west.
    WP3:
      zone: AMZ651
      period: WED
      risk_level: yellow
      row_band: yellow
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 1:50 PM (4.8 hr in). Crossing zone boundary into AMZ651.
        Course 182° → TWA ~92° beam reach. Off Hillsboro Inlet — busy
        coastal traffic zone, watch for divers/fishing boats.
      weather_risk: >
        Beam reach across AMZ651 in E 10-15 kt. Approaching
        arrival traffic zone.
    WP4:
      zone: AMZ651
      period: WED
      risk_level: green
      row_band: green
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 3:21 PM (6.4 hr in). Arrival Port Everglades Sea Buoy PE.
        Sunset Fort Lauderdale ~8:00 PM — 4h39m daylight margin.
        E 10-15 kt, seas 2-3 ft, comfortable inlet approach.
        Port Everglades is a deep commercial inlet — clear of tide-
        related concerns. HIGH RIP CURRENT RISK in area (AFDMFL)
