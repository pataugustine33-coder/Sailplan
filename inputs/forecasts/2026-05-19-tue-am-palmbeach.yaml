      weather_risk: >
        Clean mid-afternoon arrival with 4.5+ hours daylight margin.
        Deep commercial inlet, no shoal or tide constraint.

  plan_b:
    WP0:
      zone: AMZ650
      period: WED
      risk_level: green
      row_band: green
      pressure: 30.16
      pressure_trend: Steady
      notes_addendum: >
        Wed 6:00 AM EDT dawn departure. Course 176°. Pre-sea-breeze
