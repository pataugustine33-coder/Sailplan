# Forecast bundle for PalmBeach-FtLauderdale — Tue 5/19 AM cycle.
# MFL office only (entire route within KMFL CWA).
# Pulled fresh via Claude in Chrome Tue 5/19 around 11:00 AM EDT.
#
# Synopsis: Persistent east-southeast onshore flow with Bermuda high
# anchored east and a cut-off upper low meandering near the Bahamas.
# Atlantic waters under SCEC (E 15-20 kt, seas 3-4 occ 5 ft) through
# today and Tuesday night, easing modestly for Wednesday to E 10-15 kt
# and seas 2-3 ft. By Plan A arrival window (Wed 2-4 PM) AMZ650 and
# AMZ651 both show E 10-15 kt, seas 2-3 ft — comfortable beam-reach
# conditions for southbound passage.
#
# Wind direction relative to Stream: E wind across south-flowing axis
# is the FAVORABLE quadrant. We are NOT opposing the Stream with N
# wind, which would produce dangerous standing seas. Crossing wind
# raises wind-wave height somewhat over the Stream but does not stack
# the seas.
#
# Hazards: 1) Afternoon thunderstorms favor interior/SW Florida —
# track is on the east coast, so coastal storms unlikely but possible
# late afternoon. 2) Stream west wall is just 7-10 NM offshore — easy
# to ride the edge for ~1-2 kt south-flowing assist. 3) HIGH RIP
# CURRENT RISK at all SE FL beaches through Wed evening — bears on
# inlet approach at Port Everglades.

