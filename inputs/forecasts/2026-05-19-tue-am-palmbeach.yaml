    - "11 NM east southeast of Jupiter Inlet"
    - "7 NM east of Port Everglades"
    - "1 NM north northeast of Fowey Rocks"
  notes: |
    Stream west wall is exceptionally close to the SE FL coast —
    7-10 NM offshore. The entire planned route hugs the inshore
    edge of the Stream, gaining moderate 1-2 kt south-flowing
