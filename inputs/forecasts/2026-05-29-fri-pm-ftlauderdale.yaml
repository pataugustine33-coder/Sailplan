# Forecast bundle for FtLauderdale-Beaufort — Fri 5/29 PM cycle.
# All five offices (MFL, JAX, CHS, ILM, MHX) pulled fresh via Claude
# in Chrome on Fri 5/29 between 13:00 and 14:30 EDT.
#
# OVERALL PICTURE:
# A reinforcing cold front passes the SC/NC offshore zone Sat evening
# through Sun afternoon (NE 20-25 G 30 kt, seas 6-9 ft in AMZ182/184).
# This is WHY the original Sat 5/30 departure was DELAYED to Mon 6/1.
#
# Monday 6/1 IS the post-frontal calm window:
#   - MFL: "gentle westerly winds for next several days"
#   - ILM marine: "Monday as the center of the high winds up well
#     offshore... light southerly wind to commence. This new fetch
#     should work to diminish any weekend swell"
#   - MHX outlook: "By Sunday afternoon, NE winds will have decreased
#     to 10-20 kt but 6+ ft seas may linger through at least part of
#     Monday"
#
# Caveat: a SECOND cold front arrives Mon evening/Tue (per ILM AFD:
# "next late season cold front arrives late Monday into Monday night
# ... a healthy trough gets carved into the MidAtlantic. Headlines
# may be needed again, this time possibly area-wide"). That second
# front affects WP5-WP8 (GA/SC/NC) Wed-Thu of the trip.
#
# Wed-Thu portion (WP7-WP11) is BEYOND bulletin horizon (5-day
# forecast reaches Tue 6/2 night). Per methodology, those WPs are
# marked as synoptic estimate from AFD long-term discussions, not
# from a published marine forecast.

