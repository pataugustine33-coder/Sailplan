plan_commentary:
  plan_a: |
    Leg 1 of FL→Nantucket trip. Mon 6/1 06:00 AM EDT depart Fort
    Lauderdale (Port Everglades Sea Buoy). 640 NM passage with three
    distinct weather phases:

    Phase 1 — Mon AM through Tue early AM (WP0-WP2, ~21 hr): Post-
    frontal calm window with W 10-15 kt close-to-beam reach starboard
    tack. Immediate Gulf Stream entry off Port Everglades (Stream
    west wall just 10 NM NE per MFL 5/29 synopsis) — 1-2 kt N-flowing
    Stream assist throughout FL east coast.

    Phase 2 — Tue daytime through Wed dawn (WP3-WP6, ~28 hr):
    SECOND COLD FRONT PASSAGE. Per ILM AFD: "next late season cold
    front arrives late Monday into Monday night ... headlines may be
    needed again, this time possibly area-wide". Effects on track:
    NE 15-20 kt G 20, seas 3-5 ft occ 6 ft. Wind on the nose for
    courses 341-350° at WP3/WP4 — expect 1-2 kt SOG penalty close-
    hauled. Wind backs to N/NE by WP5 allowing comfortable beam
    reach again.

    Phase 3 — Wed PM through Fri AM arrival (WP7-WP11, ~31 hr):
    BEYOND 5-day bulletin horizon. Synoptic estimate from JAX/ILM/MHX
    AFD long-term discussions: high pressure builds offshore Tue-Fri,
    breezy NE-E onshore flow Wed-Fri. Translated estimate for track:
    NE 10-20 kt, seas 4-7 ft offshore zones. The course turn at WP9
    (Cape Lookout) from 051° to 314° puts NE wind from broad reach
    to close reach on port tack — reefing prudent.

    Arrival Beaufort Inlet sea buoy Fri 6/5 01:25 AM EDT. Night
    arrival accepted per skipper preference. Beaufort Inlet is a
    deep commercial inlet (channel project depth 47 ft), well-
    marked, suitable for competent night entry.

    REFRESH POINTS REQUIRED:
    - Mon evening (~24 hr in): pull CWFMFL/CWFJAX cycle to verify
      second-front timing
    - Tue evening (~36 hr in): pull CWFCHS/CWFILM to firm up
      Wed-Thu conditions (Wed enters bulletin horizon by Tue PM
      issuance)
    - Wed evening (~60 hr in): pull CWFILM/CWFMHX to firm up Thu
      approach to Hatteras/Beaufort (Thu enters bulletin horizon
      by Wed PM)
    - Thu evening (~84 hr in): final approach decision, verify
      Beaufort area conditions

    All four refresh points are time-stamped in the workbook's
    Refresh Cadence tab.
