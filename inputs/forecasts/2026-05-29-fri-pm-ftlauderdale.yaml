afd_marine:
  MFL: |
    Gentle westerly winds will prevail (away from the seabreeze) for
    the next several days. Low seas will prevail through the weekend,
    but a northerly swell from high pressure building into the western
    Atlantic may increase seas across the Gulf Stream early next week.
    Multiple rounds of showers and storms expected.
  JAX: |
    Cold front shifts back south into GA waters late Saturday night and
    likely into northeast FL waters on Sunday. The front will remain
    nearly stationary or drift southward early next week.
    Long-term outlook: By Tuesday, models in good agreement shifting
    the front south of the local forecast area with much drier air
    (PWAT falling below 1 inch) under drier NW steering flow which
    will bring lower rain chances. Wednesday through Friday, a much
    drier pattern unfolds with below normal PWAT and onshore, easterly
    flow as surface high pressure builds north of the region Tuesday
    with breezy onshore flow, then the ridge settles south and east
    building offshore of the southeast Atlantic seaboard into late
    next week.
  CHS: |
    Saturday through Tuesday: Moderate east southeasterly winds will
    be apparent Saturday, veer NE overnight into Sunday. Quite breezy
    as cold front pushes south on Sunday with speeds 20-25 G 30 kt
    possible. Seas peak 6-8 ft SC waters Sun. Marine conditions should
    improve on Monday and Tuesday.
  ILM: |
    Saturday through Wednesday: Re-enforcing high pressure behind
    Friday's cold front pushes conditions close to SCA Saturday night.
    Abating trend in both winds and seas slated for Monday as center
    of high winds up well offshore allowing light southerly to
    commence. This new fetch should work to diminish weekend swell for
    some docile marine conditions. Next late season cold front arrives
    late Monday into Monday night. Headlines may be needed again, this
    time possibly area-wide.
  MHX: |
    Reinforcing cold front Saturday night brings even drier and cooler
    air. NEerly surge will increase winds to 20-25 kt G 25-30 kt late
    Sat afternoon into early Sunday morning. Seas will respond by
    building to 5-9 ft. By Sunday afternoon NE winds decreased to
    10-20 kt but 6+ ft seas may linger through at least part of Monday.
    Next chance for showers/thunderstorms arrives Monday ahead of yet
    another cold front. Conditions dry out later Monday night with
    high pres returning for Tue into midweek.

synopses:
  MFL:
    zone: AMZ600
    text: |
      Sat-Sun reinforcing front passes SC/NC offshore zone with NE
      20-25 G 30 kt and seas 6-9 ft AMZ182/184. Mon 6/1 is post-
      frontal calm — light W/SW flow, abating seas. Second cold
      front pushes through NC Mon evening/Tue. Wed-Thu of trip is
      BEYOND bulletin horizon — synoptic estimate from AFD long-
      term: high pressure builds offshore Tue-Fri, breezy NE-E
      onshore flow Wed-Fri.
  JAX:
    zone: AMZ400
    text: |
      Front shifts back south Sat night into NE FL waters Sunday.
      Long-term: By Tuesday, models in good agreement shifting
      front south with much drier air under NW steering flow.
      Wednesday through Friday, drier pattern unfolds with onshore
      easterly flow as surface high builds north of region Tuesday
      with breezy onshore flow.
  CHS:
    zone: AMZ300
    text: |
      Saturday through Tuesday: Moderate ESE winds veer NE overnight
      into Sunday. Breezy as cold front pushes south Sunday morning
      with 20-25 G 30 kt. Seas peak 6-8 ft SC waters Sun. Marine
      conditions improve Monday and Tuesday.
  ILM:
    zone: AMZ200
    text: |
      Re-enforcing high pressure pushes conditions close to SCA Sat
      night. Abating trend Monday as center of high winds up well
      offshore allowing light southerly. Next late season cold front
      arrives late Monday into Monday night. Headlines may be needed
      again, possibly area-wide.
  MHX:
    zone: AMZ100
    text: |
      Reinforcing cold front Saturday night. NEerly surge increases
      winds to 20-25 G 25-30 kt late Sat into early Sunday. Seas
      build to 5-9 ft. By Sunday afternoon NE decreases to 10-20 kt
      but 6+ ft seas linger through part of Monday. Next chance
      for storms Monday ahead of yet another cold front. Dry out
      later Monday night with high pres for Tue into midweek.

gulf_stream:
  effective_date: "2026-05-29"
  positions:
    - "10 NM NE of Port Everglades (departure)"
    - "3 NM ENE of Lake Worth"
    - "11 NM ENE of Jupiter Inlet"
    - "50 NM E of Flagler Beach"
    - "58 NM E of St Augustine Beach"
    - "70 NM ESE of Jacksonville Beach"
    - "71 NM ESE of St Simons Island"
  notes: |
    For SE FL coast the Stream west wall is exceptionally close (3-11
    NM), making the WP1 routing trivially in the favorable
    north-flowing band. North of Jacksonville the Stream bends well
    offshore (~60-80 NM) — track stays inshore of the bend. Stream
    gives 1-2 kt N-flowing assist for WP0-WP3 then route exits the
    Stream gradient by WP4. Stream Hazards listed as None by MFL.

# ==================================================================
# Per-WP forecast assignments
# Plan A only. Wed-Thu WPs are synoptic estimate.
# ==================================================================
waypoint_assignments:
  plan_a:
    WP0:
      zone: AMZ651
      period: MON
      risk_level: green
      row_band: green
      pressure: 29.96
      pressure_trend_auto: true
      notes_addendum: >
        Mon 6/1 06:00 AM EDT depart Port Everglades. Post-frontal calm
        — W 10-15 kt forecast. Course 009° → TWA ~80° close-to-beam
        reach starboard tack. LKWF1 buoy reading Fri 5/29 PM: E 6 G 7
        (pre-frontal, lighter than forecast). Stream west wall 10 NM
        NE of inlet — northbound enters favorable N-flowing band
        immediately.
      weather_risk: >
        Post-frontal departure window. W 10-15 kt close reach in
        easing seas, immediate Stream assist. Watch for residual
        weekend swell N 1-2 ft @ 5 sec out of phase with wind wave.

    WP1:
      zone: AMZ670
      period: MON
      risk_level: green
      row_band: green
      pressure: 30.00
      pressure_trend_auto: true
      notes_addendum: >
        Mon 02:19 PM EDT (8.3 hr in). Course 351° → TWA ~80° close-to-
        beam reach. In Stream main axis, ~2 kt N-flowing assist
        expected. Off Hobe Sound. Seas 2-4 ft NW 2 ft @ 5 sec, modest
        secondary SW 2 ft @ 4 sec.
      weather_risk: >
        Stream-edge ride developing. Comfortable beam reach in
        westerly. Watch for Mon afternoon convective activity per
        MFL/JAX AFDs — though favored over interior FL, isolated
        offshore cells possible.

    WP2:
      zone: AMZ575
      period: MON
      risk_level: green
      row_band: green
      pressure: 30.00
      pressure_trend_auto: true
      notes_addendum: >
        Tue 02:54 AM EDT (20.9 hr in). Off Cape Canaveral at 28.5°N.
        Zone AMZ575 (MLB Flagler-Brevard 20-60 NM) — DATA PROXY from
        JAX office (CWFMLB pull failed Fri 5/29 PM, Chrome MCP
