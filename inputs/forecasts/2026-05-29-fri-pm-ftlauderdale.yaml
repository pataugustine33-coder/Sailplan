        proxy is reasonable. Course 350° → TWA ~80° (assuming wind
        still W/NW post-frontal). Buoy 41009 nearby reads NE 4 G 6
        with 2 ft E swell @ 9s — calm pre-departure baseline.
      weather_risk: >
        Night transit middle FL coast. JAX AFD long-term proxy:
        drier NW steering Tue. Comfortable conditions. Stream still
        favorable, ~1.5 kt N-flowing assist.

    WP3:
      zone: AMZ474
