plan_commentary:
  plan_a: |
    Palm Beach (Lake Worth Inlet) → Charleston, 383 NM in ~55 hours
    at expected 7 kt SOG. Departure Sun 6/21 5:00 PM EDT, arrival
    Tue 6/23 11:43 PM EDT. HR 54 with Stream-edge ride for ~50 hours
    of favorable N-flowing current assist.

    THREE WEATHER PHASES:

    Phase 1 (Sun PM → Mon AM, WP0-WP3, ~15 hr): BENIGN. Light S/SW
    5-10 kt, seas 1-2 ft, broad reach starboard with Stream assist.
    Watch for Sun evening convective cells through dusk; activity
    dies by midnight.

    Phase 2 (Mon PM → Tue PM, WP4-WP9, ~32 hr): BUILDING. Front
    approaches from N, wind backs from SW to W to SW again as we
    transit through frontal axis. Mon night sees JAX/CHS wind
    increase to SW 15-20 kt G 20-25 kt offshore zones. Seas build
    from 2 to 3-4 ft. Pressure drops from 30.00 to 29.94 inHg.

    Phase 3 (Tue PM-evening arrival, WP10-WP11, ~7 hr): ACTIVE
    FRONT. SW 15-20 G 25 kt across CHS waters per AMZ360/AMZ362.
    CHS AFD describes this as "fairly marginal for Small Craft
    Advisories" — borderline but no SCA issued. Final 50 NM is
    beam-to-close reach starboard, then close reach port tack for
    the last 8 NM into Charleston Harbor as course turns to 306°.

