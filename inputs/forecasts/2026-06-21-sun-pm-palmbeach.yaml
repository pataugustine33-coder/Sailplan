afd_marine:
  CHS: |
    Through Tonight: A southerly flow regime near 10 kt with seas 1-2
    ft will prevail through tonight with the waters positioned along
    the western flanks of Atlantic high pressure.

    Monday through Friday: The coastal waters will become positioned
    between high pressure centered well offshore and an approaching
    cold front Monday night, leading to increasing winds and building
    seas. Gusts could approach 25 knots at times Monday evening into
    Tuesday evening, but looks fairly marginal for Small Craft
    Advisories. Conditions should stay below advisory levels through
    Friday.
  JAX: |
    A frontal boundary will shift north of the waters Today. Showers
    and storms will push over the waters this afternoon and into the
    evening hours Tonight. Weak high pressure ridge will slowly build
    in over the area waters on Monday and into Tuesday, with isolated
    to scattered thunderstorms returning by midweek as another front
    moves in from the north. Stronger offshore winds with exercise
    caution level winds looks possible for offshore waters Monday
    into Tuesday.
  MFL: |
    Light southeasterly winds continue across the Atlantic waters
    today with southwesterly winds over the Gulf transitioning to
    westerly through the afternoon. Tonight, winds could veer from
    the north/northeast across all local waters before settling back
    from the south on Monday morning. Isolated to scattered showers
    and thunderstorms are possible across the local waters each day
    with locally hazardous winds and seas possible with any storms.
    Seas are expected at 1-2 feet or less outside of any thunderstorm
    activity.

synopses:
  MFL:
    zone: AMZ600
    text: |
      Light SE winds across Atlantic waters today, light SW Gulf
      transitioning to W through afternoon. Tonight winds may veer
      N/NE before settling back from S Monday morning. Isolated to
      scattered storms each day with locally hazardous winds/seas
      possible. Seas 1-2 ft outside storms. Gulf Stream Hazards: None.
  MLB:
    zone: AMZ500
    text: |
      Generally favorable boating conditions outside offshore-moving
      lightning storms, as high pressure over subtropical Atlantic
      extending to Florida remains in control. Ridge axis stationary
      over South FL to Straits of FL, continuing offshore (WSW-SW)
      flow, shifting SSE-E from afternoons into early overnight
      behind sea breeze. Winds generally 5-10 kt, occasionally 15 kt
      in overnight periods. Seas 1-2 ft. Gulf Stream Hazards: None.
  JAX:
    zone: AMZ400
    text: |
      Frontal boundary shifts north of the waters Today. Showers and
      storms push over waters this afternoon and into evening hours
      Tonight. Weak high pressure ridge slowly builds in over waters
      on Monday and into Tuesday, with isolated to scattered
      thunderstorms returning by midweek as another front moves in
      from the north. Stronger offshore winds with exercise caution
      level winds looks possible for offshore waters Monday into
      Tuesday.
  CHS:
    zone: AMZ300
    text: |
      Broad high pressure will reside over the area through Monday. A
      cold front will approach the area Monday night into Tuesday and
      stall across southeast South Carolina and southeast Georgia
      through the end of the week.

