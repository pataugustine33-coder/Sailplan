# Forecast bundle for PalmBeach-Charleston — Sun 6/21 PM cycle.
# All four offices (MFL, MLB, JAX, CHS) pulled fresh via Claude in Chrome
# Sun 6/21 around 4:10 PM EDT.
#
# OVERALL PICTURE:
#
# General pattern: High pressure ridge dominant through Sun-Mon. Frontal
# boundary approaches SC/GA Mon night → stalls across SE SC/SE GA Tue
# through Friday. South Florida stays under stationary high ridge axis
# with light SE/S winds.
#
# Three weather phases for this passage:
#
# Phase 1 — Sun PM through Mon AM (WP0-WP3, ~15 hr): BENIGN. Light S/SW
# 5-10 kt in MFL/MLB zones, seas <2 ft, Stream-edge assist. Watch for
# Sun evening convective activity per JAX AFD (45-55 mph gust potential
# in storms, dying after midnight per CHS AFD: "focus for convection
# shifting offshore" midnight Sun).
#
# Phase 2 — Mon PM through Tue PM (WP4-WP9, ~26 hr): BUILDING. Frontal
# approach increases winds. JAX 20-60 NM: SW 15 kt Mon night. CHS
# AMZ360/AMZ380: SW 15-20 G 25 kt Mon night through Tue, seas 3-4 ft.
# AFD CHS: "looks fairly marginal for Small Craft Advisories."
#
# Phase 3 — Tue PM into Tue night arrival (WP10-WP11, ~7 hr): FRONT
# WINDOW. Arrival 11:43 PM EDT in active SW 15-20 G 25 forecast period.
# Close-hauled to close reach port tack — 1-2 kt SOG penalty. Slowing
# the passage (arriving Wed AM) would be better but skipper accepted
# night arrival with this front condition implicit.

