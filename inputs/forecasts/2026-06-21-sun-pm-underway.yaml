plan_commentary:
  plan_a: |
    UNDERWAY UPDATE — Sun 6/21 9:30 PM EDT, from current position
    27.48°N, 79.94°W (12 NM ESE Vero Beach in Stream) to Charleston
    Harbor Entrance. 339 NM remaining.

    Vessel progress: ~44 NM in 4h25m at ~10 kt SOG since 5:00 PM
    Sun departure (1.5+ kt above pre-departure plan). Cat sailing
    well in evening SSE breeze + 2+ kt Stream assist.

    THREE PHASES from current position:

    Phase 1 (Sun 21:30 → Mon mid-afternoon, WP0-WP3, ~146 NM):
    Light SW 5-10 kt MLB/JAX zones, seas 1-2 ft, Stream assist
    holds through WP2-3. Cat largely motor-sailing below 9 kt TWS
    crossover but still making 7.5-8 kt with Stream. Watch radar
    Sun evening for residual convective cells per MLB AFD chance
    of evening thunderstorms.

    Phase 2 (Mon afternoon → Tue dawn, WP3-WP6, ~107 NM):
    Wind builds S 10-15 → SW 15 G 20 across JAX/CHS zones as front
    approaches. JAX MON NIGHT seas 2-3 ft S @ 4 sec. Cat broad-to-
    beam reach starboard — favorable point of sail, polar shows
    9-10 kt boat speed. This is the cat-favored corridor where you
    bank time.

    Phase 3 (Tue dawn → Tue afternoon arrival, WP6-WP9, ~86 NM):
    Front window. CHS TUE: SW 15-20 G 25, seas 3-4 ft AMZ360/AMZ382.
    Cat reefed beam-to-close reach approaching Charleston. Convective
    activity ongoing in SC nearshore zone per 41033 Sun 8 PM reading
    (WSW 23 G 31, localized) — verify via fresh pulls Mon AM and
    Tue dawn.

    TACTICAL CONSIDERATION: At current 10 kt SOG average, arrival
    would shift earlier (Tue morning, ahead of front peak). At
    polar-driven expected ~8 kt avg, arrival lands in Tue PM front
    peak. At deliberate 7 kt avg, arrival shifts to Tue night after
    front clears. Decision point: refresh again Mon late afternoon
    (after CHS 4 PM cycle) and commit to push-hard OR slow-down.

    REFRESH POINTS REQUIRED:
    - Mon ~6 AM EDT (~9 hr in): CWFJAX + 41008/41033 buoys —
      verify front timing has not accelerated
    - Mon ~4 PM EDT (~19 hr in): CWFCHS + AFDCHS — commit to
      Push-Hard vs Slow-Down pacing strategy
    - Tue dawn (~33 hr in): CWFCHS + 41033/41004 — final approach
      decision; verify Charleston Harbor conditions for arrival
