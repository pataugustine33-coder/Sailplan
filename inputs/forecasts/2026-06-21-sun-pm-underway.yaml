afd_marine:
  CHS: |
    Updated synopsis from CHS 539 PM EDT Sun 6/21 bulletin:
    Broad high pressure will reside over the area through Monday. A
    cold front will approach the area Monday night into Tuesday and
    stall across southeast South Carolina and southeast Georgia
    through the end of the week. Tue conditions on SC coastal waters
    forecast SW 15-20 G 25 kt with seas 3-4 ft, then improving Tue
    night as front passes (SW shifting W 10-15 after midnight,
    seas subsiding 2-3 ft).

    Underway observation Sun 8 PM: Buoy 41033 (Fripp Island
    Nearshore) reading WSW 23 G 31 kt while neighbors at 14 G 18
    indicates LOCALIZED CONVECTIVE activity at 41033, consistent
    with AFD chance-of-evening-storms. Not synoptic front yet.

synopses:
  MLB:
    zone: AMZ500
    text: |
      Generally favorable conditions outside offshore-moving lightning
      storms, as high pressure over subtropical Atlantic extending
      to Florida remains in control. Ridge axis of the high stationary
      over South FL to Straits of FL, continuing offshore (WSW-SW)
      flow shifting SSE-E afternoons into early overnights behind
      sea breeze. Wind 5-10 kt occasionally 15 kt overnight. Seas
      1-2 ft. High chances for lightning storms through this evening.
      Gulf Stream Hazards: None.
  JAX:
    zone: AMZ400
    text: |
      Frontal boundary shifts north of waters Today. Showers and storms
      push over waters this afternoon and into evening hours. Weak high
      pressure ridge slowly builds Monday-Tuesday with isolated to
      scattered thunderstorms returning by midweek as another front
      moves in from the north. Stronger offshore winds with exercise
      caution level winds possible for offshore waters Mon-Tue.
  CHS:
    zone: AMZ300
    text: |
      Broad high pressure resides over area through Monday. Cold front
      approaches Monday night into Tuesday and stalls across southeast
      SC and southeast GA through end of week. Tue seas peak 3-4 ft
      AMZ360/382, subsiding 2-3 ft Tue night after midnight.

