afd_marine:
  CHS: |
    AFDCHS 623 AM EDT Mon 6/22 — Marine section:

    Today: Broad southerly flow today as high pressure holds offshore.
    West winds 10-15 kt back to SW later, increasing to 15-20 kt
    G 25 kt across South Santee-Edisto Beach nearshore + offshore
    legs later this afternoon. Seas build 2-4 ft.

    Tonight: Classic summer nocturnal surge as high remains well
    offshore and a cold front approaches from NW. Highest winds
    center across SC nearshore + offshore waters with frequent
    gusts 25-30 kt peaking over South Santee-Edisto Beach legs.
    HREF probabilities for frequent gusts >25 kt surge 30-65% by
    4 PM, peak 70-100% a few hours prior to daybreak Tuesday.
    SMALL CRAFT ADVISORY ISSUED FOR AMZ360 from 4 PM until 6 AM
    Tuesday. Seas avg 2-4 ft, build 4-5 ft over AMZ380 after midnight.

    Tuesday through Saturday: Weak front approaches Carolina coast
    Tue and stalls. Pinched pressure gradient results in gusts
    approaching 25 kt at times Tue, especially across Charleston
    nearshore. A brief SCA could be needed mainly afternoon-evening
    hours. Then pressure gradient relaxes as high rebuilds. No
    additional marine concerns.

