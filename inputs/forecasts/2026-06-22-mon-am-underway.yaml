plan_commentary:
  plan_a: |
    MON 6/22 AM UNDERWAY REFRESH — Vessel position 29°13.576'N
    80°00.214'W (in Stream, ~30 NM ENE of planned WP2). 234 NM
    remaining. Polar-natural pace expected ~9 kt avg → arrival
    Tue 6/23 ~10:00 AM EDT.

    KEY CHANGES FROM SUN 9 PM CYCLE:
      - SMALL CRAFT ADVISORY ISSUED for AMZ360 (Charleston coastal)
        from Mon 4 PM through Tue 6 AM EDT
      - Gust upgrade Mon night to G 30 kt across SC offshore zones
      - 41033 normalized (Sun spike was convective, confirmed)
      - Front clearing post-midnight Tue confirmed

    OPTIMAL ARRIVAL WINDOW: Tue 6 AM - noon EDT
      → POST-SCA expiration (SCA expires 6 AM Tue)
      → Daylight
      → No advisory in effect
      → Pre-Tue PM "brief SCA may be needed" risk
      → Sweet spot is roughly Tue 7-11 AM

    PACING STRATEGY:
      - Polar-natural ~9 kt avg → arrive Tue ~10 AM (SWEET SPOT)
      - Push-hard 10 kt avg → arrive Tue ~6 AM (tail end of SCA)
      - Steady 8 kt → arrive Tue ~12 PM (post-SCA, daylight, OK)
      - Slow-down 7 kt → arrive Tue ~4 PM (risk Tue PM brief SCA)

    The cat's polar-natural pace through this forecast lands
    almost perfectly in the sweet spot. Recommendation:
    DON'T push hard or slow down — let the polar drive the pace.

    REFRESH POINTS REQUIRED:
      - Mon 4 PM EDT: pull CWFCHS + AFDCHS after the SCA peak
        starts. Verify gust thresholds being met or exceeded.
      - Mon late evening / Tue dawn (around WP4-WP5): final
        verification of arrival window conditions. Pull 41033,
        41008, CWFCHS.
