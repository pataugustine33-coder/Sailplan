plan_commentary:
  plan_a: |
    MON 6/22 PM UNDERWAY REFRESH — Vessel position 31°07.963'N
    79°46.848'W (in Stream offshore, ~100 NM east of GA coast).
    102 NM remaining to Charleston Harbor.

    PACING PROBLEM:
      Vessel has averaged 11.2 kt SOG since Mon dawn (115 NM in
      10h 14m). If this pace continues:
        Continued 10-11 kt SOG → arrive Tue ~2-3 AM EDT (in SCA, dark)
        Polar-natural 9 kt avg → arrive Tue ~4 AM (in SCA, dark)
        Reefed 7-7.5 kt → arrive Tue ~6:20 AM (SCA expiration, dawn) ✓
        Reefed 6 kt → arrive Tue ~9:30 AM (post-SCA, daylight)

    The polar-driven build in this workbook lands the vessel at the
    UNCONSTRAINED polar pace (~3-4 AM). That's the "no action taken"
    scenario. To land in the optimal Tue dawn-to-mid-morning window,
    the skipper must ACTIVELY SLOW DOWN by:
      - Single-reefed main + small jib (cat from 9 → 7 kt)
      - Or double-reefed + staysail (cat from 9 → 6 kt)

    KEY CHANGES FROM MON AM CYCLE:
      - SCA confirmed for AMZ360 only (nearshore Charleston) through
        Tue 6 AM. AMZ380 (offshore approach) NOT in SCA per AFD.
      - Gust downgrade: Mon night now G 25 (was G 30 Mon AM).
      - 41033 still soft at SSW 12 G 16 — surge hasn't peaked yet.
      - 41004 already at G 19 with 3.3 ft seas.

    DECISION POINTS:
      WP1 (~7 PM Mon): commit to reef-down pacing if Tue dawn arrival
        is the target. Sunset at 8:30 PM — natural watch handover.
      WP2 (~10 PM Mon): if still pushing hard, this is last call to
        slow before AMZ380 peak conditions.
      WP3 (~12 AM Tue): IN the peak surge window per AFD HREF. Wind
        and seas at their worst. No more time to slow down — you're
        committed to whatever pace you have at this point.

    REFRESH RECOMMENDATIONS:
      Mon 10 PM EDT — pull 41033/41008/41004 to verify SCA conditions
        are or are not materializing as forecast.
      Tue 2 AM EDT — final approach check; verify wind has not
        escalated beyond G 25 forecast.
