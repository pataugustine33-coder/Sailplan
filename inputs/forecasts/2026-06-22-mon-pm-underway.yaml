afd_marine:
  CHS: |
    AFDCHS 433 PM EDT Mon 6/22 — Marine section:

    Through tonight: Broad south-southwesterly flow will persist across
    the waters as high pressure holds well offshore. Expect winds to range
    from 10 to 15 kt, then increasing to 15 to 25 kt across the nearshore
    Charleston waters late this afternoon. The afternoon seabreeze will
    likely remain pinned to/near the coastline as the westerly flow aloft
    delays the onset. As a cold front approaches overnight, expect the
    highest winds to center across the nearshore Charleston AND offshore
    Charleston waters with the risk of reaching frequent gusts 25-30 kt.
    Thus, a Small Craft Advisory has been issued for the Charleston
    nearshore waters. AT THIS TIME, SMALL CRAFT ADVISORIES ARE NOT BEING
    CURRENTLY ISSUED FOR THE OFFSHORE WATERS. Expect seas to range from
    2 to 4 ft, then increasing to 4 to 5 ft across the offshore
    Charleston waters briefly after midnight.

    Tuesday through Saturday: Weak cold front should approach the
    Carolina coastline Tuesday morning, and then stall nearby through
    end of week. Pressure gradient becomes pinched between offshore
    high and Mid-Atlantic low. This will result in gusts reaching 25-27
    kt at times Tuesday afternoon, especially across Charleston
    nearshore waters. A brief Small Craft Advisory could be needed,
    mainly between afternoon and evening hours. Thereafter, gradient
    relaxes as high rebuilds. No additional marine concerns.

