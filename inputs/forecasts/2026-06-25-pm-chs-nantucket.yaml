# Forecast bundle — Charleston SC → Nantucket MA, OUTREMER 55.
# All products LIVE-fetched Thu Jun 25 2026 PM cycle (Chrome → NWS/OPC).
#
# CYCLE DATA (all issued Thu 6/25 PM):
#   - CWFCHS synopsis 2:24 PM EDT  + AFDCHS marine 2:21 PM EDT
#   - AFDMHX (Newport/Morehead City marine) 3:06 PM EDT
#   - OPC OFFNT2 (FZNT22 KWBC, mid-Atlantic offshore) 4:20 PM EDT
#   - OPC OFFNT1 (New England offshore) 4:20 PM EDT
#   - AFDBOX (Boston/Norton marine) 2:54 PM EDT
#   - NHC Tropical Wx Outlook (MIATWOAT) 2:00 PM EDT — NO development 7 days
#
# SYNOPTIC HEADLINE: A COLD FRONT is the dominant feature. Warm front lifts
# N tonight→Fri; cold front approaches Fri night, crosses central/southern
# offshore waters Sat→Sun night; winds veer SW→NE behind it Sun-Mon. High
# builds in behind. PEAK OFFSHORE HAZARD = Sat night (ANZ920 SW 20-30 kt,
# seas to 8 ft) with frontal convection / downburst risk. NANTUCKET APPROACH
# = light but FOG-prone (SST gradient 83°F Gulf Stream → 58°F shelf).

