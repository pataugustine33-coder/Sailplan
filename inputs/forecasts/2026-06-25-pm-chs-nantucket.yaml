waypoint_assignments:
  plan_a:
    WP0:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.06
      pressure_trend_auto: true
      notes_addendum: >
        Fri ~7:00 AM EDT departure, Charleston Sea Buoy 2CL. Morning
        ebb (L 12:00 PM, H 5:52 AM) carries the cat out the jetties.
        High pressure over the region → benign start. AFDCHS marine:
        S-SW 10-15 kt, gusts ~20, seas ~2 ft. Buoy 41008 (Grays Reef)
        7.8 G 9.7, pres 30.03 falling. Course 056° → TWA ~120-150°
        broad reach starboard. Set nav-light + watch bill before dark.
      weather_risk: >
        Easy daylight departure under high pressure. Light-moderate S-SW
        broad reach with morning ebb assist. Convection chance low.
    WP1:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.05
      pressure_trend_auto: true
      notes_addendum: >
        Fri ~late morning. Crossing the Gulf Stream western wall ENE of
        Charleston (warm push, SST climbing toward 83°F at 41002). Expect
        +1.5-2.5 kt favorable Stream set on the Charleston→Hatteras leg —
        the build's boat speed is THROUGH-WATER and therefore conservative
        on this segment. Watch for Stream-edge convergence chop if wind
        opposes current (wind S-SW with NE-flowing Stream = following).
      weather_risk: >
        Comfortable Stream entry. Following wind-over-current keeps the
        sea state down. Significant SOG boost expected over ground.
    WP2:
      zone: ANZ835
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.02
      pressure_trend_auto: true
      notes_addendum: >
        Fri afternoon, off Long Bay / S of Cape Fear in the Stream. OPC
        ANZ835 FRI: S-SW 5-15 kt, seas 3-4 ft. Course 077°. Buoy 41002
        (S Hatteras) SSW 200° 15.5 G 17.5, water 83.5°F for Stream
        ground-truth. Pressure easing as the warm sector arrives ahead
        of the front.
      weather_risk: >
        Pleasant Stream reach, S-SW 5-15 kt, 3-4 ft. Hold the favorable
        current band; monitor for isolated Stream-edge cells.
    WP3:
      zone: ANZ835
      period: FRI_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 29.98
      pressure_trend_auto: true
      notes_addendum: >
        Fri night, Frying Pan offing (E of the shoals — give Frying Pan
        Shoals a wide berth). ANZ835 FRI NIGHT: S-SW 10-20 kt, seas 3-5
        ft. First full night at sea; reef for the watch. Course 056°.
        Pressure falling steadily — cold front is the story for Sat.
      weather_risk: >
        Night transit, S-SW 10-20 kt building, 3-5 ft. Reef before dark.
        Keep well east of Frying Pan Shoals. Radar watch for convection.
    WP4:
      zone: ANZ833
      period: SAT
      risk_level: yellow
      row_band: yellow
      pressure: 29.94
      pressure_trend_auto: true
      notes_addendum: >
        Sat midday, SE of Cape Lookout approaching the Hatteras Stream
        exit. ANZ833 SAT: SW 15-20 kt, seas 4-6 ft. Diamond Shoals lies
        ahead — the course bends N to clear it well offshore. Gulf Stream
        SST max here; wind-over-current still following (SW wind / NE
        set). Convection chances rising per AFDMHX (Gulf Stream showers
        & tstms Sat).
      weather_risk: >
        SW 15-20 kt, 4-6 ft. Building ahead of the front. Watch radar —
        Gulf Stream convection Sat (downburst potential). Clear Diamond
        Shoals by a wide margin.
    WP5:
      zone: ANZ930
      period: SAT
      risk_level: yellow
      row_band: yellow
      pressure: 29.90
      pressure_trend_auto: true
      notes_addendum: >
        Sat afternoon/evening, Diamond Shoals offing / Hatteras, turning
        NNE up the shelf edge into deeper offshore water. ANZ930 SAT: SW
        15-25 kt, seas 3-6 ft (upper end developing). Course 025°. Buoy
        41001 (Hatteras E 150 NM) SSW 7.8 G 9.7 pres 30.11 for ground
        truth. This is the gateway into the Sat-night peak-wind window —
        decision point on whether to slow/heave-to or press on.
      weather_risk: >
        SW 15-25 kt, 3-6 ft and building. Pre-frontal. DECISION POINT:
        confirm reefing plan for the Sat-night blow ahead at WP6.
    WP6:
      zone: ANZ920
      period: SAT_NIGHT
      risk_level: red
      row_band: red
      pressure: 29.86
      pressure_trend_auto: true
      notes_addendum: >
        Sat night, mid-Atlantic (Hudson Canyon offing). PEAK HAZARD OF
        THE PASSAGE. OPC ANZ920 SAT NIGHT: SW 20-30 kt, seas 4-8 ft, at
        the lowest pressure of the crossing as the COLD FRONT passes.
        AFDBOX/AFDMHX flag frontal convection with effective shear
        40-50 kt and DAMAGING DOWNBURST potential (40-60 mph gusts) along
        the front Sat night. Course 030°. Deep-reef / storm canvas;
        consider easing east to take the front more on the quarter.
      weather_risk: >
        Frontal passage. SW 20-30 kt sustained, seas to 8 ft, embedded
        convection with downburst risk. Deep reef before dark, harness/
        jacklines, slow the boat, active radar watch. The defining
        weather event of the passage — be fully set up by Sat dusk.
    WP7:
      zone: ANZ905
      period: SUN
      risk_level: yellow
      row_band: yellow
      pressure: 29.92
      pressure_trend_auto: true
      notes_addendum: >
        Sun, S of Long Island shelf edge, behind the front. Winds veer
        and ease N-NE 10-15 kt (ANZ905 SUN), seas 4-7 ft and subsiding.
        Now a beat/close reach into the new NE flow — slower VMG made
        good toward Nantucket. Course 015°. Buoy 44025 (Long Is 30 NM S)
        for ground truth. Pressure rising as high builds in.
      weather_risk: >
        Post-frontal NE 10-15 kt, lumpy residual 4-7 ft sea easing.
        Upwind work begins. Cooler, clearer air behind the front.
    WP8:
      zone: ANZ255
      period: SUN_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 30.02
      pressure_trend_auto: true
      notes_addendum: >
        SW of Nantucket Shoals — Great South Channel approach, routing
        WEST of the shoals. Light NE-to-variable 5-15 kt, seas 3-5 ft,
        but ADVECTION FOG is the hazard: buoy 44008 water 58.3°F against
        Gulf Stream air = vsby possibly <1 NM (AFDBOX flags fog/BR for
        KACK). **ARRIVAL-TIMING GATE:** if the polar pace puts this WP in
        darkness, STAND OFF SOUTH of the shoals and wait for Mon civil
        dawn (~4:34 AM) — night_arrival_accepted = false. Course 061°.
      weather_risk: >
        Light wind, but fog + Nantucket Shoals = no night approach. Hold
        south of the shoals in deep water until daylight. AIS/radar
        guard, sound signals, post extra lookout.
    WP9:
      zone: ANZ255
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.10
      pressure_trend_auto: true
      notes_addendum: >
        Mon, S of Marthas Vineyard / Sound approach. N-NE 5-15 kt, seas
        2-4 ft, fog/BR possible into the morning then lifting as the high
        settles. Daylight pilotage from here. Course 061°. Buoy 44008
        (~70 NM E) and local Nantucket obs for fog ground-truth before
        committing to the entrance.
      weather_risk: >
        Light NE, low seas, residual morning fog. Daylight approach only.
        Confirm visibility before entering the buoyed channel.
    WP10:
      zone: ANZ232
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.14
      pressure_trend_auto: true
      notes_addendum: >
        Mon arrival, Nantucket Harbor Entrance (Brant Point). Light NE-to-
        variable 5-10 kt, seas 1-3 ft, possible lingering fog/BR early.
        Nantucket Hbr tides Mon 6/29: H 12:13 AM, L 6:34 AM, H 1:09 PM,
        L 6:13 PM — a late-morning/midday entry rides the flood. Pressure
        30.14 and rising — settled. Daylight + adequate visibility
        required to enter.
      weather_risk: >
        Calm harbor approach. Only gate is visibility — wait out any
        morning fog. Flood tide late morning/midday eases the entrance.

  plan_b:
    WP0:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.06
      pressure_trend_auto: true
      notes_addendum: >
        Plan B — Fri ~11:00 AM EDT departure (4 hr later than Plan A).
        Departs near the midday low slack (L 12:00 PM) — less ebb assist
        out the jetties than the 7 AM option, but still benign. Same
        synoptic setup. This later start shifts the whole timeline ~4 hr
        right, which is the key lever on the Nantucket arrival gate.
      weather_risk: >
        Easy daylight departure, high pressure. Light-moderate S-SW.
        Later start trades morning ebb for arrival-timing flexibility.
    WP1:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.05
      pressure_trend_auto: true
      notes_addendum: >
        Fri early afternoon, Gulf Stream entry. Same favorable Stream set
        (+1.5-2.5 kt) on the run to Hatteras; build speed is through-water
        and conservative over ground here.
      weather_risk: >
        Comfortable Stream entry, following wind-over-current. SOG boost
        over ground.
    WP2:
      zone: ANZ835
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.02
      pressure_trend_auto: true
      notes_addendum: >
        Fri late afternoon/evening, off Long Bay in the Stream. ANZ835
        FRI: S-SW 5-15 kt, seas 3-4 ft. Course 077°.
      weather_risk: >
        Pleasant Stream reach, S-SW 5-15 kt, 3-4 ft.
    WP3:
      zone: ANZ835
      period: FRI_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 29.98
      pressure_trend_auto: true
      notes_addendum: >
        Fri night, Frying Pan offing. ANZ835 FRI NIGHT: S-SW 10-20 kt,
        seas 3-5 ft. Reef for the night watch; stay east of Frying Pan
        Shoals. Course 056°.
      weather_risk: >
        Night transit, S-SW 10-20 kt, 3-5 ft. Reef before dark; clear
        Frying Pan Shoals.
    WP4:
      zone: ANZ833
      period: SAT
      risk_level: yellow
      row_band: yellow
      pressure: 29.94
      pressure_trend_auto: true
      notes_addendum: >
        Sat (later than Plan A), SE of Cape Lookout. ANZ833 SAT: SW 15-20
        kt, seas 4-6 ft. Gulf Stream convection risk Sat. Clear Diamond
        Shoals well offshore. Course 056°.
      weather_risk: >
        SW 15-20 kt, 4-6 ft, building. Radar watch for Stream convection.
    WP5:
      zone: ANZ930
      period: SAT_NIGHT
