waypoint_assignments:
  plan_a:
    WP0:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend_auto: true
      notes_addendum: >
        Fri ~7:00 AM EDT departure, Charleston Sea Buoy 2CL. Morning ebb
        carries the cat out the jetties. High pressure firmly in control
        (596 dam 500 mb ridge building) → benign start. CWFCHS: SW backing
        S 10-15 kt, gusts ~20 by afternoon, seas building 2-3 ft; Wave
        Detail SE 3 ft @ 8 s. Buoy 41008 (Grays Reef) SW ~14 G 16, pres
        30.08. Heat is the shore story this weekend (triple digits Sun),
        not wind. Course 056° → broad reach starboard.
      weather_risk: >
        Easy daylight departure under strong high pressure. Light-moderate
        S-SW broad reach with morning ebb assist. Isolated afternoon cells
        inland only.
    WP1:
      zone: AMZ360
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.12
      pressure_trend_auto: true
      notes_addendum: >
        Fri late morning, Gulf Stream entry ENE of Charleston. Warm push,
        SST climbing toward ~83°F (41002 reads 82.9°F). Expect +1.5-2.5 kt
        favorable Stream set on the run to Hatteras — boat speed in this
        plan is THROUGH-WATER and therefore conservative over ground here.
        S-SW wind with NE-flowing Stream = following (sea state stays down).
      weather_risk: >
        Comfortable Stream entry. Following wind-over-current keeps seas
        easy. Significant SOG boost over ground.
    WP2:
      zone: ANZ835
      period: FRI
      risk_level: green
      row_band: green
      pressure: 30.15
      pressure_trend_auto: true
      notes_addendum: >
        Fri afternoon, off Long Bay / S of Cape Fear in the Stream. OPC
        ANZ835 TODAY: S-SW 5-15 kt, seas 3-4 ft. Course 077°. Buoy 41002
        SSW 14 G 18, water 82.9°F for Stream ground-truth. Scattered
        afternoon showers/tstms possible — routine summer convection.
      weather_risk: >
        Pleasant Stream reach, S-SW 5-15 kt, 3-4 ft. Hold the favorable
        band; radar watch for isolated cells.
    WP3:
      zone: ANZ835
      period: FRI_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 30.14
      pressure_trend_auto: true
      notes_addendum: >
        Fri night, Frying Pan offing (keep well E of Frying Pan Shoals).
        ANZ835 TONIGHT: S-SW 10-20 kt, seas 3-5 ft. First night at sea;
        reef for the watch. Course 056°. Chance of tstms — radar watch.
      weather_risk: >
        Night transit, S-SW 10-20 kt, 3-5 ft. Reef before dark. Keep east
        of Frying Pan Shoals; watch for convection.
    WP4:
      zone: ANZ833
      period: SAT
      risk_level: yellow
      row_band: yellow
      pressure: 30.12
      pressure_trend_auto: true
      notes_addendum: >
        Sat midday, SE of Cape Lookout approaching the Hatteras Stream
        exit. ANZ833 SAT: SW 15-20 kt, seas 4-5 ft. Diamond Shoals ahead —
        course bends N to clear it well offshore. Gulf Stream showers/tstms
        possible Sat (AFDMHX). Note: the Sat-afternoon SEVERE/downburst
        threat (SPC Slight 2/5) is focused on the COASTAL CAROLINAS, well
        inshore of this position.
      weather_risk: >
        SW 15-20 kt, 4-5 ft. Building but moderate. Radar watch for Gulf
        Stream cells. Clear Diamond Shoals by a wide margin.
    WP5:
      zone: ANZ930
      period: SAT
      risk_level: yellow
      row_band: yellow
      pressure: 30.10
      pressure_trend_auto: true
      notes_addendum: >
        Sat afternoon/evening, Diamond Shoals offing / Hatteras, turning
        NNE up the shelf edge. ANZ930 SAT: SW 10-20 kt, seas 3-5 ft.
        Course 025°. Buoy 41001 (Hatteras E 150 NM) SSW 14 G 16, pres
        30.14 for ground truth. Gateway into the Sat-night/Sun windier
        band at WP6 — confirm reefing plan, but conditions ahead are now
        notably milder than the Thu outlook.
      weather_risk: >
        SW 10-20 kt, 3-5 ft. Pre-frontal, moderate. Set up reefing plan
        for the windier WP6 stretch ahead.
    WP6:
      zone: ANZ920
      period: SAT_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 30.05
      pressure_trend_auto: true
      notes_addendum: >
        Sat night into Sun, mid-Atlantic (Hudson Canyon offing). WINDIEST
        LEG of the passage, but DOWNGRADED from the Thu cycle: OPC ANZ920
        SAT NIGHT is now SW 15-25 kt, seas 4-7 ft (was 20-30 / 4-8), with
        "scattered showers and tstms" — routine convection, not an
        organized squall line. The cold front is now a backdoor-type
        feature crossing the central/S waters Sun-Sun night; winds veer NE
        behind it. Course 030°, near-DDW (TWA ~165). Sail deep-reefed,
        harness/jacklines after dark, keep an active radar watch and steer
        around any cells. Locally higher winds in/near tstms.
      weather_risk: >
        Windiest leg: SW 15-25 kt, seas 4-7 ft, scattered convection.
        Deep-reef before dark, jacklines, radar watch, slow the boat in any
        cell. Elevated but manageable — no longer the dominant hazard the
        Thu outlook showed.
    WP7:
      zone: ANZ905
      period: SUN
      risk_level: yellow
      row_band: yellow
      pressure: 30.08
      pressure_trend_auto: true
      notes_addendum: >
        Sun, S of Long Island shelf edge, behind the front. Winds veer/ease
        N-NW to N-NE 5-10 kt (ANZ905 SUN), seas 4-6 ft easing. Now a
        beat/close reach into the new N-NE flow — slower VMG toward
        Nantucket. Course 015°. Buoy 44025 (Long Is) for ground truth.
        Cooler, clearing post-frontal air; high building in.
      weather_risk: >
        Post-frontal N-NE 5-10 kt, residual 4-6 ft easing. Upwind work
        begins; light and clearing.
    WP8:
      zone: ANZ255
      period: SUN_NIGHT
      risk_level: yellow
      row_band: yellow
      pressure: 30.12
      pressure_trend_auto: true
      notes_addendum: >
        SW of Nantucket Shoals — Great South Channel approach, routing WEST
        of the shoals. Light NE-to-variable 5-10 kt, seas 3-4 ft, but
        ADVECTION FOG is the hazard: buoy 44008 water 59.2°F against warm
        Stream air → vsby possibly <1 NM (AFDBOX flags fog/low stratus over
        Cape & Islands; ACK fog this morning). ARRIVAL-TIMING GATE: if the
        polar pace puts this WP in darkness, STAND OFF SOUTH of the shoals
        and wait for Mon civil dawn (~4:34 AM) — night_arrival_accepted =
        false. Course 061°.
      weather_risk: >
        Light wind, but fog + Nantucket Shoals = no night approach. Hold
        south of the shoals in deep water until daylight. AIS/radar guard,
        sound signals, extra lookout.
    WP9:
      zone: ANZ255
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.14
      pressure_trend_auto: true
      notes_addendum: >
        Mon, S of Marthas Vineyard / Sound approach. N-NE 5-10 kt, seas 2-4
        ft, fog/low stratus possible into the morning then lifting as high
        pressure settles. Daylight pilotage from here. Course 061°. Pull
        44008 and local Nantucket obs for fog ground-truth before
        committing to the entrance.
      weather_risk: >
        Light NE, low seas, residual morning fog. Daylight approach only.
        Confirm visibility before the buoyed channel.
    WP10:
      zone: ANZ232
      period: MON
      risk_level: yellow
      row_band: yellow
      pressure: 30.15
      pressure_trend_auto: true
      notes_addendum: >
        Mon arrival, Nantucket Harbor Entrance (Brant Point). Light NE-to-
        variable 5-10 kt, seas 1-3 ft, possible lingering fog/BR early.
        Nantucket Hbr tides Mon 6/29: H 12:13 AM, L 6:34 AM, H 1:09 PM, L
        6:13 PM — a late-morning/midday entry rides the flood. High
        pressure, settled. Daylight + adequate visibility required to
        enter.
      weather_risk: >
        Calm harbor approach. Only gate is visibility — wait out any
        morning fog. Flood tide late morning/midday eases the entrance.

