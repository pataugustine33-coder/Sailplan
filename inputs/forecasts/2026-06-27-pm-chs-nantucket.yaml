# Forecast bundle — Charleston SC → Nantucket MA, OUTREMER 55.
# All products LIVE-fetched Fri Jun 26 2026 AM cycle (Chrome → NWS/OPC).
# This is the DEPARTURE-MORNING refresh (supersedes the Thu 6/25 PM build).
#
# CYCLE DATA (issued Fri 6/26 AM):
#   - CWFCHS 527 AM EDT  + AFDCHS 249 AM EDT
#   - AFDMHX 357 AM EDT
#   - OPC OFFNT2 426 AM EDT (mid-Atlantic) + OFFNT1 423 AM EDT (New England)
#   - AFDBOX 323 AM EDT
#   - NHC Tropical Wx Outlook 200 AM EDT — NO development 7 days
#
# WHAT CHANGED vs the Thu PM build (the headline):
#   * The Saturday-night MID-ATLANTIC OFFSHORE PEAK SOFTENED. ANZ920 (WP6)
#     SAT NIGHT is now SW 15-25 kt / seas 4-7 ft (was SW 20-30 / 4-8). The
#     organized downburst/severe emphasis shifted to a SATURDAY-AFTERNOON
#     COASTAL-CAROLINAS convective threat (AFDMHX SPC Slight 2/5; AFDBOX
#     trended below Marginal). Offshore over the route it is now routine
#     "scattered showers and tstms," not a squall-line/downburst event.
#   * The feature is now a backdoor-type cold front crossing the central/
#     southern offshore waters SUN & SUN NIGHT (OFFNT2 synopsis), winds
#     veering to NE behind it Sun-Mon. Post-frontal seas 3-6 ft easing.
#   * NET: WP6 downgrades from RED toward YELLOW — still the windiest leg
#     with convection to watch, but no longer the dominant safety hazard.
#   * Nantucket approach UNCHANGED: light + fog. SST gradient confirmed by
#     buoys (41002 Stream 82.9F vs 44008 shelf 59.2F).

