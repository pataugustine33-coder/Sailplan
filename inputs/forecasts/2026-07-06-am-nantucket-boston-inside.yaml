        AM); the modeled ~9:50 AM transit rides a fair ebb through The Strait.
        Monitor set, favor the marked channel. Course 342. * Sea Angle synoptic
        estimate.
      weather_risk: >
        Weather benign but WOODS HOLE is a strong tidal chokepoint - rocks,
        eddies, ferry traffic. Timed on the fair W ebb; full pilotage attention.
