# Forecast bundle — Nantucket MA → Boston MA, OUTREMER 55.
# All products LIVE-fetched Mon Jul 6 2026 AM cycle (Chrome → NWS KBOX).
# PRE-DEPARTURE build for a THURSDAY 9 JULY departure (3 days out).
#
# CYCLE DATA (issued Mon 7/6 AM):
#   - CWFBOX 703 AM EDT + AFDBOX 710 AM EDT (KBOX Boston/Norton)
#   - NDBC buoys pulled 8:40 AM EDT (44020, 44008, 44013, 44090)
#
# HEADLINE (why Thursday is the window):
#   * TODAY-TUE: unsettled. A wave of low pres slides S of the waters; E-NE
#     winds gust 20-30 kt with periods of heavy rain / embedded tstms
#     (Flood Watch inland; SCA on the open waters through Tue evening).
#   * WED: front's shortwave departs; a mid-level RIDGE builds over the
#     waters. Winds ease, seas subside.
#   * THU (the passage day): DRY ridge holding for "at least a good part of
#     Thu" (AFDBOX). Winds SW-W 10-15 kt (outer Cape W 10-15 G25; Mass Bay
#     SW 10-15 G20), seas 2-4 ft. Marine outlook: winds <25 kt, seas locally
#     approaching 5 ft. A clean PRE-FRONTAL window.
#   * FRI: the next shortwave/cold front approaches later Fri into Fri night
#     — showers & tstms return. Thursday is deliberately AHEAD of it.
#
# NOTE ON SEA DETAIL: NWS drops the Wave Detail component (MWD/period) in the
# lumped "THU AND THU NIGHT" extended periods. Thursday sea HEIGHT is forecast
# (2-4 ft); sea DIRECTION/PERIOD below is a synoptic estimate (SW-W wind chop,
# short period, with a decaying SE swell from the Tue event). Flagged as
# "* Sea Angle synoptic estimate" in the per-WP notes per standard.

cycle:
  label: "Mon 7/6 AM — pre-departure pull for Thu 9 July (CWFBOX 703 AM, AFDBOX 710 AM, buoys 8:40 AM); dry pre-frontal ridge Thursday, front holds off to Friday"
  cwfbox:
    issued: "2026-07-06T07:03:00-04:00"
    label_short: "Mon 7/6 703 AM"
    label_full: "703 AM EDT Mon Jul 6 2026 (CWFBOX; low S of waters today-Tue then ridge builds Wed-Thu, cold front approaches later Fri)"
  afdbox:
    issued: "2026-07-06T07:10:00-04:00"
    label_short: "Mon 7/6 710 AM"
    label_full: "710 AM EDT Mon Jul 6 2026 (AFDBOX; dry ridge Wed into a good part of Thu, marine winds <25 kt seas approaching 5 ft Thu, front Fri)"

zones:
  # ── ANZ232 — Nantucket Sound (BOX). Departure / Great Point area (WP1).
  ANZ232:
    description: "Nantucket Sound"
    office: BOX
    periods:
      THU:
        wind_dir: "SW"
        wind_dir_deg: 225
        wind_kt: [10, 15]
        wind_gust_kt: 20
        sea_ft: [2, 3]
        wave_detail:
          primary: {direction: SW, direction_deg: 225, height_ft: 2, period_s: 4}

  # ── ANZ254 — Provincetown to Chatham to Nantucket out 20 NM (BOX).
  #    The outer-Cape / east-of-shoals legs (WP2, WP3, WP4).
  ANZ254:
    description: "Coastal waters from Provincetown MA to Chatham MA to Nantucket MA out 20 NM"
    office: BOX
    periods:
      THU:
        wind_dir: "W"
        wind_dir_deg: 270
        wind_kt: [10, 15]
        wind_gust_kt: 25
        sea_ft: [2, 4]
        wave_detail:
          primary: {direction: W, direction_deg: 270, height_ft: 3, period_s: 5}
          secondary: {direction: SE, direction_deg: 135, height_ft: 1, period_s: 9}

  # ── ANZ251 — Massachusetts Bay and Ipswich Bay (BOX).
  #    Race Point offing + Mass Bay crossing (WP5, WP6, WP7).
  ANZ251:
    description: "Massachusetts Bay and Ipswich Bay"
    office: BOX
    periods:
      THU:
