        wind_kt: [10, 15]
        wind_gust_kt: 25
        sea_ft: [2, 4]
        wave_detail:
          primary: {direction: W, direction_deg: 270, height_ft: 3, period_s: 5}
          secondary: {direction: SE, direction_deg: 135, height_ft: 1, period_s: 9}

  # ── ANZ251 — Massachusetts Bay and Ipswich Bay (BOX).
  #    Race Point offing + Mass Bay crossing (WP5, WP6, WP7).
  ANZ251:
    description: "Massachusetts Bay and Ipswich Bay"
    office: BOX
    periods:
      THU:
        wind_dir: "SW"
        wind_dir_deg: 225
        wind_kt: [10, 15]
        wind_gust_kt: 20
        sea_ft: [2, 3]
        wave_detail:
          primary: {direction: SW, direction_deg: 225, height_ft: 2, period_s: 4}

  # ── ANZ230 — Boston Harbor (BOX). Arrival (WP8).
  ANZ230:
    description: "Boston Harbor"
    office: BOX
    periods:
      THU:
        wind_dir: "SW"
        wind_dir_deg: 225
        wind_kt: [10, 15]
        wind_gust_kt: 20
        sea_ft: [1, 2]
        wave_detail:
          primary: {direction: SW, direction_deg: 225, height_ft: 2, period_s: 3}

waypoint_assignments:
  plan_a:
    WP1:
      zone: ANZ232
      period: THU
      risk_level: green
      row_band: green
      pressure: 30.10
      pressure_trend_auto: true
      notes_addendum: >
        Thu ~5:00 AM EDT first-light departure, Brant Point. Ridge in
        control after the Tue-Wed unsettled spell clears — dry, SW 10-15 kt.
        Round Great Point and stand offshore as the sun comes up (sunrise
        5:14 AM). Nantucket Hbr Thu tides: L 1:26 AM, H 7:49 AM, L 1:25 PM —
        the morning flood is making, easing the Great Point set. Course
        040°. * Sea Angle synoptic estimate (NWS drops Wave Detail in the
        Thu period).
      weather_risk: >
        Benign first-light departure under a building ridge. Light-moderate
        SW, low seas. Only discipline is a clear-eyed round of Great Point
        in improving light.
    WP2:
      zone: ANZ254
      period: THU
      risk_level: yellow
      row_band: yellow
      pressure: 30.09
      pressure_trend_auto: true
      notes_addendum: >
        Thu mid-morning, N of Great Point entering the shoals passage.
        NANTUCKET SHOALS & POLLOCK RIP: strong tidal streams and breaking
        shoals — this is a pilotage leg, not a weather leg. Stand EAST; do
        not cut inside toward Monomoy. W 10-15 kt (ANZ254) puts the wind on
        the quarter for the NE track — broad reach, comfortable. Buoy 44008
        for offshore wind/sea and SST (fog driver). Course 047°.
        * Sea Angle synoptic estimate.
      weather_risk: >
        Weather benign (W 10-15, 2-4 ft) but Nantucket Shoals / Pollock Rip
        demand full attention: stay east of the shoals, watch the tidal set,
        chartplotter + eyeball. Daylight transit at this pace.
    WP3:
      zone: ANZ254
      period: THU
      risk_level: green
      row_band: green
      pressure: 30.08
      pressure_trend_auto: true
      notes_addendum: >
        Thu midday, E of Chatham and clear of the shoals — turn N up the
        backside of the outer Cape. Open water now. W 10-15 kt, seas 2-4 ft;
        course bends to 327° so the W wind comes onto the beam/forward
        quarter — beam-to-close reach. Decaying SE swell (~1 ft, long
        period) underneath from the Tue event. Course 327°.
        * Sea Angle synoptic estimate.
      weather_risk: >
        Clear of Nantucket Shoals into open water. W 10-15 kt beam/close
