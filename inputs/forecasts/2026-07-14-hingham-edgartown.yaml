# ============================================================================
# FORECAST - Hingham -> Edgartown (Outremer 55) - Tue 14 July 2026
# CWFBOX 435 PM Mon 7/13 (FZUS51 KBOX 132035) + AFDBOX 417 PM Mon 7/13.
# HEADLINE: SCA day. High pres stationary offshore + a low passing to the N
# tighten the gradient -> gusty SW building through the afternoon to 20-25 G30
# (localized 35-40 Cape/Islands), seas 3-5 ft in Buzzards Bay / Vineyard Snd /
# Nantucket Snd. Heat Advisory ashore. A 7 AM start clears Boston Hbr -> Cape
# Cod Bay -> Canal in the calm morning; the back half (Buzzards Bay from noon,
# Woods Hole, the Sounds) is all inside the SCA. Wind-over-current in Buzzards
# Bay (SW wind vs down-bay ebb). Woods Hole foul-ebb accepted by skipper.
# ============================================================================

