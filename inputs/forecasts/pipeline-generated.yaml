synopses:
  CHS:
    zone: AMZ300
    text: 'Strong cold front passage occurring through the region this

      morning, with very strong post-frontal NW winds and building seas

      through tonight. Gale conditions expected through Monday morning,

      gradually subsiding through Tuesday as high pressure builds in

      behind the front.'
  JAX:
    zone: AMZ400
    text: 'A frontal boundary moving slowly southward across the northeast

      Florida waters will become stationary across central Florida tonight

      as a weak wave of low pressure currently over the eastern Gulf

      pushes eastward. Meanwhile, high pressure situated along the Mid-

      Atlantic coast will continue to wedge down the southeastern

      seaboard, with Small Craft Advisory conditions overspreading the

      waters south of St. Augustine this afternoon. Widespread showers and

      embedded thunderstorms will continue across our local waters through

      Wednesday morning.


      The wave of low pressure will push offshore of the east central

      Florida coast on Wednesday morning, with winds shifting to northerly

      while gradually decreasing as wrap-around showers and possibly a few

      thunderstorms continue into Wednesday afternoon. Another high

      pressure center building over the Great Lakes region will drive a

      dry frontal boundary southward across our local waters on Thursday

      morning, with this feature then weakening as it shifts over the

      southeastern states by Friday.'
afd_marine:
  CHS: 'Through tonight: Quiet conditions will continue across the local waters. A modest sea breeze should result in 10-15
    knots along the land/sea interface this afternoon and into the evening. Then overnight, 5-10 knot southwest flow will
    prevail. Seas should average around 2 feet through the period. Extended Marine: Winds will gradually increase ahead of
    an approaching cold front on Monday. The front will move through the waters Monday evening, then quickly shift offshore
    Monday night. There will be a surge of winds and building seas behind the front, leading to Small Craft Advisories for
    at least the inner waters. Gale conditions cannot be ruled out for the outer waters Monday night. Conditions will quickly
    improve late Tuesday through the remainder of the week as high pressure becomes the dominant synoptic feature.'
