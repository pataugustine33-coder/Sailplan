plan_commentary:
  plan_a: Wed 8 AM CHS departure under post-gale ridge rebuild. Charleston waters SW 20-25 kt provide beam reach southbound
    — fair sailing. Approaching JAX, wind veers NE 15-20 (head wind) — motor sailing last 40 NM. Arrival timing falls in early
    Thu AM dawn window — clean.
  plan_b: Thu 6 AM CHS departure ahead of the next frontal trough. Initial SW 20-25 kt with shower chance — pressure falling
    slowly through Thu night. Conditions improve through the passage as JAX waters transition to light N-NE behind the trough.
    Arrival Fri AM clean.
