# PLACEHOLDER YAML — Leg 2 of FL→Nantucket trip.
# Beaufort NC → Norfolk/Hampton VA, ~190 NM.
#
# THIS IS A SKELETON ONLY. Forecast will be pulled fresh at the
# Beaufort layover (expected Fri 6/5 AM after Leg 1 arrival). The
# departure date in this file is a placeholder estimate; refresh
# the cycle YAML and rebuild before commit.
#
# Route notes:
#   - Beaufort Inlet → past Cape Lookout offshore → past Cape Hatteras
#     CLEARING DIAMOND SHOALS by 25+ NM offshore → Chesapeake Bay
#     entrance buoy CB → Hampton Roads
#   - Cape Hatteras is THE major hazard zone on US East Coast.
#     Forecast horizon at time of Leg 2 build will cover this transit
#     fully if departure is within 4 days.
#   - Typical timing 27-30 hours at 7 kt average SOG
#   - Gulf Stream exits NE just past Hatteras — Stream-edge ride to
#     Hatteras is the fast option but exposes to Stream-current-against-
#     wind risk if any NE shift develops during transit.

passage:
  id: beaufort-norfolk
  name: Beaufort-Norfolk
  origin: Beaufort, NC (Beaufort Inlet Sea Buoy)
  destination: Hampton, VA (Chesapeake Bay Entrance)
  total_nm: 190.0  # placeholder — refine after WP build

