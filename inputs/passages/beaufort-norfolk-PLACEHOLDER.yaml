  civil_dawn: 5.300
  sunrise: 5.767
  sunset: 20.500
  civil_dusk: 20.950
  day_window: [5.767, 20.500]
  twilight_windows:
    - [5.300, 5.767]
    - [20.500, 20.950]
  preferred_window:
    start: 8.0
    end: 18.0
  notes: >
    Chesapeake Bay entrance approach via CB sea buoy. Bay Bridge-
    Tunnel transit follows arrival. Daylight strongly preferred for
    Bay entry due to commercial traffic density and shipping
    channel discipline.

