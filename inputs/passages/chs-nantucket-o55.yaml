# Charleston SC → Nantucket MA — OUTREMER 55.
# Offshore passage, Gulf Stream-optimized track Charleston→Hatteras, then
# NNE outside to a SW approach on Nantucket (west of Nantucket Shoals).
# Vessel block carries full Outremer attribution (VPLP / Outremer Yachting /
# Outremer base polar). Stability is ESTIMATE (multihull — monohull RM N/A).

passage:
  id: chs-nantucket-o55
  name: Charleston-Nantucket-Outremer55
  origin: Charleston, SC (Charleston Sea Buoy 2CL)
  destination: Nantucket, MA (Nantucket Harbor Entrance)
  total_nm: 730.15

# Underway vessel fix — drives the "Current Position" placemark in the KML
# (Google Earth) and the current-position row + Google Earth link on the
# Waypoints tab. UPDATE THIS EVERY REBUILD with the latest fix.
vessel_position:
  lat: 35.67063
  lon: -73.87432
  time: "Sat 6/27 10:04 PM EDT"
  cog_deg: 46
  sog_kt: 8.6
  cum_nm: 341.2
  note: "In the mid-Atlantic corridor (warm sector). 107.5 NM / 015°T to WP6. Made good 11.1 kt since the 5:50 PM fix. MCS weakened/sub-severe, moving offshore."

vessel:
  designation: Outremer 55
  design_number: O55
  load_config: cruising-loaded
  displacement_lb: 25353
  motor_speed_kt: 7.5
  motor_crossover_tws_kt: 9.0
  fuel_capacity_gal: 243
  fuel_burn_gph: 1.7

  designer: VPLP (Van Peteghem - Lauriot Prévost)
  builder: Outremer Yachting
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Outremer base polar table (PW_O55_Base_Polar.xlsx)
  data_sheet_source: Outremer Yachting catalog
  stability_source: >
    ESTIMATE — monohull RM/RMC framework does not directly apply to
    multihulls. Catamaran stability is dominated by form (beam) not
    ballast. Outremer 55 is CE Category A with ~7.8 m beam giving
    high initial stability. Diagonal stability (the cat-relevant
    failure mode — pitchpoling) and capsize threshold are not
    captured by the monohull RM curve. Values below are rough
    proxies set so the build does not fail; treat as not-applicable.

  rmc_kgm: 0
  rm_30deg_kgm: 0
  rm_max_kgm: 0
  brewer_cr: 22.5
  csf: 2.55

calibration:
  sea_factors:
    steep_chop_bow: 0.65
    close_reach: 0.85
    beam_reach: 0.94
    broad_reach: 0.95
    reefed_active_trough: 0.85

# Nantucket arrival envelope (41.28N 70.10W), late June.
# Sunrise ~5:09 AM EDT, sunset ~8:25 PM EDT; civil dawn ~4:34 AM,
# civil dusk ~9:00 PM (almanac). Night arrival NOT accepted —
# Nantucket Shoals + advection fog make a dark approach unsafe.
arrival_timing:
  destination_label: "Nantucket, MA (Nantucket Harbor Entrance)"
  civil_dawn: 4.567
  sunrise: 5.150
  sunset: 20.417
  civil_dusk: 21.000
  day_window: [5.150, 20.417]
  twilight_windows:
    - [4.567, 5.150]
    - [20.417, 21.000]
  night_arrival_accepted: false
  preferred_window:
    start: 5.5
    end: 18.0

