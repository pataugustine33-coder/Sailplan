    lat: 30.709
    lon: -81.292
    relevant_wps:
      WP4: "~17 NM SSE"
      WP5: "~7 NM SE"
      WP6: "~19 NM NNE"
  - id: SAUF1
    name: St Augustine Pier
    lat: 29.857
