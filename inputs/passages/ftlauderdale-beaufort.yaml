# Fort Lauderdale (Port Everglades) → Beaufort NC, Leg 1 of the
# FL→Nantucket trip. Stream-edge ride through Cape Lookout, HR 54.
#
# Trip context: 4-leg passage with weather-window stops.
#   Leg 1: Fort Lauderdale → Beaufort NC (~640 NM, ~3.8 days)  ← this YAML
#   Leg 2: Beaufort NC → Norfolk/Hampton VA (~190 NM)
#   Leg 3: Norfolk → Block Island RI (~340 NM)
#   Leg 4: Block Island → Nantucket (~70 NM)
#
# Departure window: Mon 6/1 06:00 AM EDT. The Sat 5/30 departure originally
# requested was DELAYED to avoid an active reinforcing cold front passage
# affecting the NC/SC offshore zone Sat evening through Sun afternoon
# (NE 20-25 kt G 30, seas 6-9 ft AMZ182/184). Mon is the post-frontal calm.
#
# Hazards on this leg:
#   1. Convective activity Mon afternoon-evening (KMHX/KILM AFD: another
#      cold front arrives "late Monday into Monday night... headlines may
#      be needed again, this time possibly area-wide" — second front, NC zone)
#   2. Wed-Thu portion of trip BEYOND bulletin horizon — synoptic estimate
#      from JAX/MHX/ILM AFD long-term discussions, not from a published
#      marine forecast
#   3. Diamond Shoals at Cape Hatteras (~25 NM E of Hatteras) — track stays
#      well offshore to clear, but route doesn't quite reach Hatteras
#      latitude on this leg (turn into Beaufort at WP9/WP10)
#   4. Frying Pan Shoals off Cape Fear (handled by WP8 routing 15 NM offshore)

passage:
