# Arrival at Beaufort NC sea buoy ~34.67°N. Sunset Beaufort 6/4-6/5
# ~8:25 PM EDT, sunrise ~5:55 AM. Skipper accepts night arrival —
# Beaufort Inlet is a deep, well-marked commercial inlet (channel
# project depth 47 ft) suitable for night entry with adequate
# pilotage skill. No reverse calc needed.
arrival_timing:
  destination_label: "Beaufort, NC (Beaufort Inlet Sea Buoy)"
  civil_dawn: 5.450
  sunrise: 5.917
  sunset: 20.417
  civil_dusk: 20.867
  day_window: [5.917, 20.417]
  twilight_windows:
    - [5.450, 5.917]
    - [20.417, 20.867]
  # NIGHT ARRIVAL ACCEPTED — explicitly per skipper preference,
  # Beaufort Inlet is deep commercial and tide-insensitive
  night_arrival_accepted: true
  preferred_window:
    start: 6.0
    end: 18.0

