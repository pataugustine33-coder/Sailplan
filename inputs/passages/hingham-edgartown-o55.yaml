# ============================================================================
# Hingham MA -> Edgartown MA (Martha's Vineyard) via Cape Cod Canal + Woods Hole
# Outremer 55.  WESTBOUND Canal (Cape Cod Bay -> Buzzards Bay), SOUTHBOUND Woods
# Hole (Buzzards Bay -> Vineyard Sound), then E along the Vineyard north shore
# into Nantucket Sound to Edgartown.  15 WPs, 76.71 NM.
# Tue 14 July 2026.  Skipper elected a 7 AM departure and ACCEPTS a foul
# (against) current at Woods Hole.
# ============================================================================

passage:
  id: hingham-edgartown-o55
  name: Hingham-Edgartown-Outremer55
  origin: "Hingham, MA (Hingham Harbor)"
  destination: "Edgartown, MA (Martha's Vineyard, Edgartown Harbor)"
  total_nm: 76.71
  route_note: >
    Westbound Cape Cod Canal + southbound Woods Hole. Three current chokepoints
    in sequence: Canal (fair EBB westbound), Buzzards Bay (fair EBB down-bay),
    Woods Hole (fair FLOOD toward Vineyard Sound). On 14 July these do not all
    align for a single fair passage; skipper elected 7 AM (fair Canal + Buzzards
    Bay, FOUL Woods Hole accepted).

vessel:
  designation: Outremer 55
  design_number: O55
  load_config: cruising-loaded
  displacement_lb: 25353
  motor_speed_kt: 7.5
  motor_crossover_tws_kt: 9.0
  fuel_capacity_gal: 243
  fuel_burn_gph: 1.7

  designer: VPLP (Van Peteghem - Lauriot Prévost)
  builder: Outremer Yachting
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Outremer base polar table (PW_O55_Base_Polar.xlsx)
  data_sheet_source: Outremer Yachting catalog
  stability_source: >
    ESTIMATE — monohull RM/RMC framework does not directly apply to
    multihulls. Catamaran stability is dominated by form (beam) not
    ballast. Outremer 55 is CE Category A with ~7.8 m beam giving
    high initial stability. Diagonal stability (the cat-relevant
    failure mode — pitchpoling) and capsize threshold are not
    captured by the monohull RM curve. Values below are rough
    proxies set so the build does not fail; treat as not-applicable.

  rmc_kgm: 0
  rm_30deg_kgm: 0
  rm_max_kgm: 0
  brewer_cr: 22.5
  csf: 2.55

calibration:
  sea_factors:
    steep_chop_bow: 0.65
    close_reach: 0.85
    beam_reach: 0.94
    broad_reach: 0.95
    reefed_active_trough: 0.85

# Edgartown arrival envelope (Edgartown Harbor ~41.389N 70.513W), Tue 14 Jul 2026.
# Sun times (almanac, Martha's Vineyard): sunrise ~5:19 AM EDT, sunset ~8:14 PM
# EDT; civil dawn ~4:48 AM, civil dusk ~8:46 PM EDT.
# Night arrival NOT accepted (daylight-preferred rule); Edgartown is a busy
# summer mooring field, so a daylight arrival is strongly preferred.
arrival_timing:
  destination_label: "Edgartown, MA (Martha's Vineyard, Edgartown Harbor)"
  civil_dawn: 4.80
  sunrise: 5.317
  sunset: 20.233
  civil_dusk: 20.767
  day_window: [5.317, 20.233]
  twilight_windows:
    - [4.80, 5.317]
    - [20.233, 20.767]
  night_arrival_accepted: false
  preferred_window:
    start: 6.0
    end: 20.0

plans:
  - id: plan_a
    tab_label: "Plan A - Tue 7 AM Depart"
    qualifier: "skipper's choice (Tue 14 July 7:00 AM EDT); 7 AM reaches the Cape Cod Canal east entrance ~12:30 PM on the fair ebb near its 12:38 PM max, and Buzzards Bay on its fair down-bay ebb; Woods Hole ~3 PM is a FOUL ebb (accepted, ~2-2.5 kt against, past the max); back half inside the Tue SCA (SW 20-25 G30, 3-5 ft); daylight arrival ~5:30 PM"
    depart_day: Tue
    depart_date: 2026-07-14
    depart_hour: 7.0
  - id: plan_b
    tab_label: "Plan B - Tue 8.30 AM Depart"
    qualifier: "tide-optimal sensitivity (Tue 14 July 8:30 AM EDT); a later start reaches Woods Hole near its 4:57 PM slack (fair evening flood into Vineyard Sound) instead of the foul ebb, at the cost of a later arrival (~6:30-7 PM) deeper into the SCA afternoon wind; Plan A is the skipper's pick"
    depart_day: Tue
    depart_date: 2026-07-14
    depart_hour: 8.5

