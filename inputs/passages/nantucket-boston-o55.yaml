# Nantucket MA → Boston MA — OUTREMER 55.
# OFFSHORE route around the OUTSIDE of Cape Cod: round Great Point, stand
# EAST of Nantucket Shoals and Pollock Rip, up the backside (eastern shore)
# of the outer Cape, round Race Point / Provincetown, then SW across
# Massachusetts Bay to Boston. Deliberately avoids the Cape Cod Canal.
#
# Vessel block carries full Outremer attribution (VPLP / Outremer Yachting /
# Outremer base polar). Stability is ESTIMATE (multihull — monohull RM N/A).
# Pre-departure build (NOT underway): two departure-time scenarios, full
# route WP1->WP10 on each. No vessel_position / underway_start.

passage:
  id: nantucket-boston-o55
  name: Nantucket-Boston-Outremer55
  origin: Nantucket, MA (Nantucket Harbor Entrance / Brant Point)
  destination: Boston, MA (President Roads / Inner Harbor)
  total_nm: 103.73

vessel:
  designation: Outremer 55
  design_number: O55
  load_config: cruising-loaded
  displacement_lb: 25353
  motor_speed_kt: 7.5
  motor_crossover_tws_kt: 9.0
  fuel_capacity_gal: 243
  fuel_burn_gph: 1.7

  designer: VPLP (Van Peteghem - Lauriot Prévost)
  builder: Outremer Yachting
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Outremer base polar table (PW_O55_Base_Polar.xlsx)
  data_sheet_source: Outremer Yachting catalog
  stability_source: >
    ESTIMATE — monohull RM/RMC framework does not directly apply to
    multihulls. Catamaran stability is dominated by form (beam) not
    ballast. Outremer 55 is CE Category A with ~7.8 m beam giving
    high initial stability. Diagonal stability (the cat-relevant
    failure mode — pitchpoling) and capsize threshold are not
    captured by the monohull RM curve. Values below are rough
    proxies set so the build does not fail; treat as not-applicable.

  rmc_kgm: 0
  rm_30deg_kgm: 0
  rm_max_kgm: 0
  brewer_cr: 22.5
  csf: 2.55

calibration:
  sea_factors:
    steep_chop_bow: 0.65
    close_reach: 0.85
    beam_reach: 0.94
    broad_reach: 0.95
    reefed_active_trough: 0.85

# Boston arrival envelope (President Roads ~42.35N 70.99W), Thu 9 July 2026.
# Sun times live-fetched for the date: sunrise 5:14 AM EDT, sunset 8:23 PM
# EDT; civil dawn ~4:42 AM, civil dusk ~8:56 PM EDT.
# Night arrival NOT accepted for the standard (daylight-preferred rule).
# NOTE: Boston is a major, heavily-lit commercial harbor and IS routinely
# enterable after dark — a night arrival here is far lower-consequence than
# at Nantucket. Kept false so any post-dusk ETA flags for a conscious skipper
# decision rather than passing silently.
arrival_timing:
  destination_label: "Boston, MA (President Roads / Inner Harbor)"
  civil_dawn: 4.700
  sunrise: 5.233
  sunset: 20.383
  civil_dusk: 20.933
  day_window: [5.233, 20.383]
  twilight_windows:
    - [4.700, 5.233]
    - [20.383, 20.933]
  night_arrival_accepted: false
  preferred_window:
    start: 6.0
    end: 20.0

