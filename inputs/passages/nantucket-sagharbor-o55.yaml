# ============================================================================
# Nantucket MA -> Sag Harbor NY (Outremer 55) - Sun 19 July 2026
# 105.3 NM open-water passage across TWO forecast offices: KBOX (Nantucket Sound,
# Vineyard Sound, Rhode Island Sound, Block Island Sound) and KOKX (Peconic &
# Gardiners Bays). Route: Nantucket -> W through the Sounds -> past Gay Head/
# Cuttyhunk -> Rhode Island Sound -> N of Block Island -> past Montauk into
# Gardiners Bay -> Shelter Island Sound -> Sag Harbor. Depart 6 AM (skipper).
# NOTE: the strong Race/Plum Gut gates are OFF this route (Gardiners Bay is
# entered from the SE past Montauk), so currents are a secondary factor.
# CURRENTS/TIDES: CO-OPS predictions API was DOWN at build time (returned no
# data for all stations incl. today) - tide/current timing here is QUALITATIVE,
# pending a re-pull before the GO. Weather is fully sourced (fresh Chrome pull).
# ============================================================================

passage:
  id: nantucket-sagharbor-o55
  name: Nantucket-SagHarbor-Outremer55
  origin: "Nantucket, MA (Nantucket Harbor)"
  destination: "Sag Harbor, NY (Shelter Island Sound / Gardiners Bay)"
  total_nm: 105.27
  route_note: >
    Long open-water run Nantucket->Sag Harbor across KBOX + KOKX waters. NW/W
    wind day (Sun 7/19): upwind BEAT out of Nantucket (heading W into a W wind)
    for the first ~20 NM, freeing to a reach farther W; light NW 5-10 in
    Gardiners Bay on the approach. Daylight arrival achievable at O55 speeds
    (8+ kt) but speed-dependent. Currents secondary (no strong on-route gates).

vessel:
  designation: Outremer 55
  design_number: O55
  load_config: cruising-loaded
  displacement_lb: 25353
  motor_speed_kt: 7.5
  motor_crossover_tws_kt: 9.0
  fuel_capacity_gal: 243
  fuel_burn_gph: 1.7

  designer: VPLP (Van Peteghem - Lauriot Prévost)
  builder: Outremer Yachting
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Outremer base polar table (PW_O55_Base_Polar.xlsx)
  data_sheet_source: Outremer Yachting catalog
  stability_source: >
    ESTIMATE — monohull RM/RMC framework does not directly apply to
    multihulls. Catamaran stability is dominated by form (beam) not
    ballast. Outremer 55 is CE Category A with ~7.8 m beam giving
    high initial stability. Diagonal stability (the cat-relevant
    failure mode — pitchpoling) and capsize threshold are not
    captured by the monohull RM curve. Values below are rough
    proxies set so the build does not fail; treat as not-applicable.

  rmc_kgm: 0
  rm_30deg_kgm: 0
  rm_max_kgm: 0
  brewer_cr: 22.5
  csf: 2.55

calibration:
  sea_factors:
    steep_chop_bow: 0.65
    close_reach: 0.85
    beam_reach: 0.94
    broad_reach: 0.95
    reefed_active_trough: 0.85

# Sag Harbor arrival envelope (~41.00N 72.29W), Sun 19 Jul 2026.
# Sun times (almanac, eastern Long Island): sunrise ~5:25 AM EDT, sunset ~8:17
# PM EDT; civil dawn ~4:54 AM, civil dusk ~8:49 PM EDT.
# Night arrival NOT accepted (daylight-preferred); Sag Harbor approach threads
# Shelter Island Sound - a daylight arrival is strongly preferred.
arrival_timing:
  destination_label: "Sag Harbor, NY (Shelter Island Sound)"
  civil_dawn: 4.90
  sunrise: 5.42
  sunset: 20.28
  civil_dusk: 20.82
  day_window: [5.42, 20.28]
  twilight_windows:
    - [4.90, 5.42]
    - [20.28, 20.82]
  night_arrival_accepted: false
  preferred_window:
    start: 6.0
    end: 20.28

plans:
  - id: plan_a
    tab_label: "Plan A - Sun 6 AM Depart"
    qualifier: "skipper's choice (Sun 19 July 6:00 AM EDT). 105.3 NM; upwind beat out of Nantucket Sound early (W 15-20 G25, SCA tail through Sun AM), freeing to a reach across Vineyard/Rhode Island Sound (3-5 ft residual SW swell), then light NW 5-10 in Gardiners Bay. Daylight arrival achievable at 8+ kt avg (~7 PM at 8 kt, ~5:40 PM at 9 kt); the beat-start and light-NW finish are the risks to daylight."
    depart_day: Sun
    depart_date: 2026-07-19
    depart_hour: 6.0
  - id: plan_b
    tab_label: "Plan B - Sun 5 AM Depart"
    qualifier: "daylight-margin hedge (Sun 19 July 5:00 AM EDT, one hour earlier). Banks an hour against the risk that the upwind start + light-NW Gardiners Bay finish slow the O55 and push the 6 AM arrival toward dusk. Pre-dawn Nantucket Harbor departure (civil dawn ~4:54 AM), so lit-harbor exit. Same weather; ~1 hr earlier at every WP."
    depart_day: Sun
    depart_date: 2026-07-19
    depart_hour: 5.0

