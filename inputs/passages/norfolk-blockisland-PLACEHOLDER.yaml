# PLACEHOLDER YAML — Leg 3 of FL→Nantucket trip.
# Norfolk/Hampton VA → Block Island RI, ~340 NM.
#
# THIS IS A SKELETON ONLY. Forecast will be pulled fresh at the
# Norfolk layover. The departure date is a placeholder estimate;
# refresh the cycle YAML and rebuild before commit.
#
# Route notes:
#   - Chesapeake Bay exit via CB sea buoy → offshore NJ → past
#     Delaware Bay → past NY Bight → past Long Island sound entrance
#     → Block Island
#   - Typical timing 48-54 hours at 7 kt average SOG
#   - Key hazards: Hudson Canyon traffic separation, Nantucket Shoals
#     fringe at far north end of route (if cutting close to Block)
#   - Office coverage: AKQ → PHI → OKX → BOX

passage:
  id: norfolk-blockisland
  name: Norfolk-BlockIsland
  origin: Hampton, VA (Chesapeake Bay Entrance)
  destination: Block Island, RI (Great Salt Pond entrance buoy)
  total_nm: 340.0  # placeholder

vessel:
  designation: HR 54
  design_number: D1206
  load_config: half-load
  displacement_lb: 57982
  motor_speed_kt: 6.5
  motor_crossover_tws_kt: 7.5
  fuel_capacity_gal: 238
  fuel_burn_gph: 2.0
  rmc_kgm: 656
  rm_30deg_kgm: 14619
  rm_max_kgm: 23654
  brewer_cr: 52.1
  csf: 1.55
  designer: Germán Frers
  builder: Hallberg-Rassy
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Frers VPP
  data_sheet_source: Hallberg-Rassy data sheet
  stability_source: Frers GZ curve (Full Load)

calibration:
  sea_factors:
    steep_chop_bow: 0.72
    close_reach: 0.87
    beam_reach: 0.92
    broad_reach: 0.92
    reefed_active_trough: 0.85

arrival_timing:
  destination_label: "Block Island, RI"
  civil_dawn: 4.700
  sunrise: 5.183
  sunset: 20.367
  civil_dusk: 20.850
  day_window: [5.183, 20.367]
  twilight_windows:
    - [4.700, 5.183]
    - [20.367, 20.850]
  preferred_window:
    start: 8.0
    end: 17.0
  notes: >
    Great Salt Pond entrance at Block Island. Tide-sensitive at the
    narrow entry — flood preferred. Daylight required for entry to
    Great Salt Pond. Arrival timing will be the critical constraint
    for this leg.

