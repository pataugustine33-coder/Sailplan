# Outremer 55 — Mon 6/22 PM underway refresh.
# Vessel at 31°07.963'N 79°46.848'W (Mon 4:44 PM EDT), in Stream centerline
# ~100 NM offshore of Brunswick/Sapelo Sound GA. 102 NM remaining to
# Charleston Harbor Entrance.
#
# Track since Mon AM refresh (29.23°N, 6:30 AM EDT → 31.13°N, 4:44 PM EDT):
#   115 NM in 10h 14m = 11.2 kt sustained average. Cat is screaming with
#   building SW + partial Stream assist. Banking significant time vs the
#   forecast pace, but pushing INTO the front peak window.
#
# THE TIMING PROBLEM:
#   SCA active for AMZ360 (Charleston nearshore) until 6 AM Tue.
#   AFD peak surge "a few hours prior to daybreak Tuesday" = ~3-5 AM Tue.
#   At sustained 10+ kt SOG, the polar projects arrival Tue ~2:30-3 AM —
#   deep in the SCA window, dark, peak gust period.
#   At reefed 7 kt avg, arrival lands Tue ~6:20 AM — RIGHT AT SCA
#   expiration and at dawn.
#   At reefed 6 kt avg, arrival lands Tue ~9 AM — post-SCA, daylight,
#   calmest after the front clears.
#
# Recommendation: REEF AND SLOW. Don't let the polar drive arrival into
# the worst of the front. Target Tue 7-9 AM dawn-to-mid-morning arrival.
#
# Polar-natural arrival in this YAML lands at Tue ~3-4 AM showing the
# UNCONSTRAINED result. The plan is to clearly show the "if you don't
# slow down, this is where you arrive" so the skipper sees the choice
# point in the workbook.

