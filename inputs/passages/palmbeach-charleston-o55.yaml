# Palm Beach → Charleston SC passage — OUTREMER 55 variant.
# Identical route, forecast, and waypoints to palmbeach-charleston.yaml.
# Only the vessel block, calibration motor crossover, and stability fields
# differ. The forecast and buoy YAMLs are vessel-agnostic and reused.

passage:
  id: palmbeach-charleston-o55
  name: PalmBeach-Charleston-Outremer55
  origin: Palm Beach, FL (Lake Worth Inlet Sea Buoy LW)
  destination: Charleston, SC (Charleston Harbor Entrance)
  total_nm: 383.09

vessel:
  designation: Outremer 55
  design_number: O55
  load_config: cruising-loaded
  # Displacement: Outremer 55 = 9.0 t light / 11.5 t cruising-loaded.
  # 11.5 t = 25,353 lb. Modest displacement for a 55' cat.
  displacement_lb: 25353
  # Twin Yanmar 4JH80 (80 HP each, 160 HP total). Cruising single-engine
  # 7.5 kt; both engines 8.5-9 kt. Use single-engine cruise as baseline.
  motor_speed_kt: 7.5
  # Motor crossover TWS is HIGHER than HR boats because the cat's motor
  # speed (7.5 kt) is also higher. At beam reach, polar exceeds 7.5 kt
  # around TWS=9 kt (vs HR 54 at TWS=7.5 kt). Cats need more wind to
  # beat their faster motoring speed.
  motor_crossover_tws_kt: 9.0
  # Twin diesels, 460 L each tank = ~243 gal total fuel.
  fuel_capacity_gal: 243
  # Single-engine cruise burn ~1.7 gph at 7.5 kt; both engines ~3.5 gph
  # at 8.5 kt. Use single-engine cruise as the baseline burn rate.
  fuel_burn_gph: 1.7

  designer: VPLP (Van Peteghem - Lauriot Prévost)
  builder: Outremer Yachting
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Outremer base polar table (PW_O55_Base_Polar.xlsx)
  data_sheet_source: Outremer Yachting catalog
  stability_source: >
    ESTIMATE — monohull RM/RMC framework does not directly apply to
    multihulls. Catamaran stability is dominated by form (beam) not
    ballast. Outremer 55 is CE Category A with ~7.8 m beam giving
    high initial stability. Diagonal stability (the cat-relevant
    failure mode — pitchpoling) and capsize threshold are not
    captured by the monohull RM curve. Values below are rough
    proxies set so the build does not fail; treat as not-applicable.

  # The RM fields below are PROXY values set to non-zero so the build
  # framework's stability section renders. They are NOT comparable to
  # monohull RM values — catamaran stability operates on different
  # physics. Do not use these for trip risk decisions; refer to the
  # qualitative stability_source note above.
  rmc_kgm: 0
  rm_30deg_kgm: 0
  rm_max_kgm: 0
  # Brewer Comfort Ratio and CSF are monohull formulas. Computed below
  # purely for completeness but they don't carry their usual meaning
  # for a cat.
  brewer_cr: 22.5     # very low CR — cat is "uncomfortable" by monohull standards (rides like a different boat)
  csf: 2.55           # CSF >> 2 = cat would be capsize-prone if it WERE a monohull; for a cat this is irrelevant

calibration:
  # Outremer 55 is a different beast for sea-factor calibration. The
  # catamaran sees less wave-induced penalty on the beam (broader
  # platform doesn't pitch like a monohull) but a HIGHER penalty when
  # head-to-chop (the bridge deck slams). For this passage with
  # primarily 90-135° TWAs in 2-4 ft seas, the HR-derived sea factors
  # are a reasonable starting point — refine with logged passage data.
  sea_factors:
    steep_chop_bow: 0.65    # cats slam harder upwind — penalty larger than HR
    close_reach: 0.85
    beam_reach: 0.94        # cats less affected by beam seas — penalty smaller
    broad_reach: 0.95
    reefed_active_trough: 0.85

