# Palm Beach (Lake Worth Inlet) → Charleston SC passage definition.
# HR 54 (D1206), Stream-edge ride.
# Sun 6/21 5:00 PM EDT departure ("ASAP" per skipper request 6/21 PM).
#
# Key trip context:
# - 383 NM total, ~55 hours at expected 7 kt SOG → arrival Tue 6/23 11:43 PM EDT
# - 12 waypoints, route stays just inside Stream west wall for favorable
#   N-flowing current (1-2 kt boost most of the route)
# - Night arrival Charleston Harbor accepted per skipper preference
#   (Charleston Harbor entrance is deep commercial, well-marked, JAR/jetty
#   lighted approach suitable for competent night entry)
#
# Hazard assessment from forecast cycle (Sun 6/21 PM):
#
#   1. ARRIVAL WIND CONCERN: CHS forecast SW 15-20 G 25 kt Tue afternoon
#      through Tue evening across AMZ360/AMZ362 with seas 3-4 ft. Wind
#      from SW with northbound course = TWA close-hauled to close reach
#      port tack. Borderline SCA conditions per AFD CHS: "looks fairly
#      marginal for Small Craft Advisories." Final approach happens in
#      this regime.
#
#   2. TIMING SENSITIVITY: At 7 kt avg arrives Tue 11:43 PM (during front
#      window). At 6.5 kt arrives Wed 4 AM (BETTER — front beginning to
#      clear). At 7.5 kt Stream-assist arrives Tue 9 PM (worse — full
#      front exposure). A slower passage is actually safer here.
#
#   3. CONVECTIVE ACTIVITY: Daily afternoon thunderstorms expected per
#      all four offices. JAX warns of 45-55 mph gust potential in storms
#      Sun evening. Plan to avoid afternoon convection cells via radar
#      monitoring; the wide offshore track helps.
#
#   4. NO GULF STREAM HAZARDS (per MFL synopsis 6/21 4:11 PM)
#
#   5. NO ACTIVE WATCHES/WARNINGS at any office along route as of pull

