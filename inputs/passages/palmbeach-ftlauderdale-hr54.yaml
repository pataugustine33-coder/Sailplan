# Palm Beach (Lake Worth Inlet) → Fort Lauderdale (Port Everglades) passage definition
# — HR 54 variant.
# Identical route, forecast, and waypoints to palmbeach-ftlauderdale.yaml.
# Only the vessel block, calibration motor crossover, and stability numbers
# differ. The route and forecast inputs remain vessel-agnostic.

passage:
  id: palmbeach-ftlauderdale-hr54
  name: PalmBeach-FtLauderdale-HR54
  origin: Palm Beach, FL (Lake Worth Inlet Sea Buoy LW)
  destination: Fort Lauderdale, FL (Port Everglades Sea Buoy PE)
  total_nm: 41.38

vessel:
  designation: HR 54
  design_number: D1206
  load_config: half-load
  displacement_lb: 57982         # empty per HR 54 data sheet (26.3 t)
  motor_speed_kt: 6.5            # HR 54 baseline cruising motor speed (D4-180)
  motor_crossover_tws_kt: 7.5    # crossover slightly higher than HR48 — bigger boat needs more wind
  fuel_capacity_gal: 238         # 900 L Volvo D4-180 tank
  fuel_burn_gph: 2.0             # at 6.5 kt cruise (D4-180 burns ~30% more than D3-110)
  rmc_kgm: 656                   # 4,745 lb-ft ÷ 7.233
  rm_30deg_kgm: 14619            # Frers Full Load source
  rm_max_kgm: 23654              # Frers Full Load source, peak ~70° heel
  brewer_cr: 52.1
  csf: 1.55
  designer: Germán Frers
  builder: Hallberg-Rassy
  ce_category: A
  ce_category_note: Ocean — unlimited offshore
  polar_source: Frers VPP
  data_sheet_source: Hallberg-Rassy data sheet
  stability_source: Frers GZ curve (Full Load)

# Sea factor lookup — same selector logic. HR 54 is hull-form similar to HR 48
# (same Frers design lineage, identical SA/D ratio 19.0 vs 18.9), so the same
# sea-factor calibration applies. Refinement would come from logged HR 54 SOG
# data over actual passages.
calibration:
  sea_factors:
    steep_chop_bow: 0.72
    close_reach: 0.87
    beam_reach: 0.92
    broad_reach: 0.92
    reefed_active_trough: 0.85

# Arrival timing rules at destination (Fort Lauderdale, ~26.09°N).
# Same daylight envelope as the HR 48 build.
arrival_timing:
  destination_label: "Fort Lauderdale (Port Everglades)"
  civil_dawn: 6.000
  sunrise: 6.500
  sunset: 20.000
  civil_dusk: 20.417
  day_window: [6.500, 20.000]
  twilight_windows:
    - [6.000, 6.500]
    - [20.000, 20.417]
  preferred_window:
    start: 14.0
    end: 17.0

# Waypoints — IDENTICAL to the HR 48 build. Same route, same Stream-edge
# routing, same arrival inlet.
waypoints:
  - id: WP0
    name: Lake Worth Inlet Sea Buoy LW
    lat: 26.7717
    lon: -80.0167
    cum_nm: 0.00
    course_out: 176
  - id: WP1
    name: Offshore Boynton (Stream west edge)
    lat: 26.5500
    lon: -80.0000
    cum_nm: 13.34
    course_out: 186
  - id: WP2
    name: Offshore Boca Raton
    lat: 26.3500
    lon: -80.0250
    cum_nm: 25.42
    course_out: 202
  - id: WP3
    name: Offshore Hillsboro Inlet
    lat: 26.2570
    lon: -80.0670
    cum_nm: 31.45
    course_out: 182
  - id: WP4
    name: Port Everglades Sea Buoy PE
    lat: 26.0917
    lon: -80.0750
    cum_nm: 41.38
    course_out: null

# Same two-plan structure as HR 48 build for direct comparison.
plans:
  - id: plan_a
    tab_label: "Plan A - Wed 9 AM"
    qualifier: ""
    depart_day: Wed
    depart_date: 2026-05-20
    depart_hour: 9.0
  - id: plan_b
    tab_label: "Plan B - Wed 6 AM"
    qualifier: "(dawn departure sensitivity)"
    depart_day: Wed
    depart_date: 2026-05-20
    depart_hour: 6.0

# Buoys relevant to this route — same set as HR 48 build.
route_buoys:
  - id: LKWF1
    name: Lake Worth Pier (departure area)
    lat: 26.613
    lon: -80.033
    relevant_wps:
      WP0: "~10 NM N (departure-area wind ground truth)"
      WP1: "~3 NM N"
  - id: 41122
    name: Hollywood Beach Nearshore (arrival area)
    lat: 26.002
    lon: -80.097
    relevant_wps:
      WP3: "~16 NM S"
      WP4: "~5 NM SSW (arrival-area wave ground truth)"
  - id: 41113
    name: Cape Canaveral Nearshore (upstream proxy)
    lat: 28.400
    lon: -80.533
    relevant_wps:
      WP0: "~120 NM N (upstream wind/wave reference, 1-2 hr lead)"
  - id: 41009
    name: Canaveral 20 NM E (upstream proxy)
    lat: 28.506
    lon: -80.185
    relevant_wps:
      WP0: "~107 NM N (offshore upstream reference)"

forecast_offices:
  - office: NWS Miami FL (KMFL)
    code: MFL
    zones:
      AMZ650: Coastal waters from Jupiter Inlet to Deerfield Beach FL out 20 NM
      AMZ651: Coastal waters from Deerfield Beach to Ocean Reef FL out 20 NM
      AMZ670: Waters from Jupiter Inlet to Deerfield Beach FL from 20 to 60 NM
      AMZ671: Waters from Deerfield Beach to Ocean Reef FL from 20 to 60 NM

tide_stations:
  - id: 8722670
    name: Lake Worth Pier, Atlantic Ocean, FL
    relevance: departure
  - id: 8722956
    name: Port Everglades, FL
    relevance: arrival
